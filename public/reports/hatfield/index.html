document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Dev-only diagnostics: log to console instead of a user-visible overlay —
  // a stray asset (e.g. an unfilled media-gallery placeholder) shouldn't
  // read as a broken page to whoever's actually using the dashboard.
  window.addEventListener('error', function(e) {
    console.warn('[bundle]', e.message || e.type, e.filename ? '(' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

13, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"2636e867-e892-4d17-94b4-e81cfd40b93f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"811eeeb2-834f-4a6f-a492-f29a1611e67b\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box}\n    body{margin:0;font-family:'Manrope',Arial,Helvetica,sans-serif;background:#F4F6F8;color:#111827}\n    ::placeholder{color:#94A3B8}\n    a{color:#0A2342}\n    a:hover{color:#F28C28}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ isLoggedOut }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A2342\">\n    <div style=\"background:#fff;border-radius:24px;padding:40px;width:400px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.3)\">\n      <div style=\"display:flex;gap:12px;align-items:center;margin-bottom:24px\">\n        <img src=\"41766498-7254-4425-b9a7-91a20acb445f\" alt=\"Leegra\" style=\"height:40px;width:auto\">\n        <div>\n          <h1 style=\"margin:0;font-size:20px;color:#0A2342;font-weight:800\">Leegra<\u002Fh1>\n          <p style=\"margin:0;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.06em\">Dealership Audit Access<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:13px;color:#64748b;margin:0 0 6px;font-weight:700\">Sign in with your assigned email<\u002Fp>\n      <input placeholder=\"you@hatfieldgroup.co.za\" value=\"{{ loginEmail }}\" onchange=\"{{ handleLoginEmail }}\" style=\"border:1px solid #d1d5db;border-radius:12px;padding:12px 14px;font-family:inherit;width:100%;margin-bottom:10px\">\n      <button onclick=\"{{ handleLogin }}\" style=\"border:0;background:#0A2342;color:#fff;padding:12px 16px;border-radius:12px;font-weight:700;cursor:pointer;width:100%\">Sign In<\u002Fbutton>\n      <sc-if value=\"{{ hasLoginError }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"color:#DC2626;font-size:12px;margin:10px 0 0\">{{ loginError }}<\u002Fp>\n      <\u002Fsc-if>\n      <p style=\"color:#94a3b8;font-size:11px;margin:16px 0 0;line-height:1.5\">Access is granted per person by an Admin — whole dashboard, a single dealership, or one department within a dealership. Contact your Group Admin if you don't have access yet.<\u002Fp>\n      <p style=\"color:#cbd5e1;font-size:10px;margin:10px 0 0\">Try: admin@hatfieldgroup.co.za<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isDashboardRoute }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex;min-height:100vh\">\n  <aside style=\"width:264px;background:#0A2342;color:#fff;padding:24px;position:fixed;height:100vh;display:flex;flex-direction:column;overflow-y:auto\">\n    <div style=\"display:flex;gap:12px;align-items:center;margin-bottom:20px\">\n      <img src=\"41766498-7254-4425-b9a7-91a20acb445f\" alt=\"Leegra\" style=\"height:44px;width:auto;flex-shrink:0\">\n      <div>\n        <h1 style=\"margin:0;font-size:23px;letter-spacing:.4px;font-weight:800\">Leegra<\u002Fh1>\n        <p style=\"margin:2px 0 0;color:#B8C4D9;font-size:12px;letter-spacing:.06em;text-transform:uppercase\">Dealership Audit<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:10px 12px;margin-bottom:16px\">\n      <img src=\"b1877a43-467a-475c-a123-6d29f2483b96\" alt=\"Hatfield Motor Group\" style=\"width:40px;height:40px;border-radius:50%;flex-shrink:0\">\n      <div>\n        <p style=\"margin:0;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#B8C4D9\">Client<\u002Fp>\n        <p style=\"margin:1px 0 0;font-size:12px;font-weight:700;color:#fff\">Hatfield Motor Group<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.1);border-radius:12px;padding:10px 12px;margin-bottom:18px\">\n      <p style=\"margin:0;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#B8C4D9\">Signed in as<\u002Fp>\n      <p style=\"margin:2px 0 0;font-size:12px;font-weight:700;color:#fff\">{{ currentUserLabel }}<\u002Fp>\n      <button onclick=\"{{ handleLogout }}\" style=\"margin-top:6px;border:0;background:none;color:#F28C28;font-size:11px;font-weight:700;cursor:pointer;padding:0\">Sign out<\u002Fbutton>\n    <\u002Fdiv>\n    <nav style=\"display:grid;gap:8px\">\n      <a href=\"#dashboard\" style=\"color:#dbeafe;text-decoration:none;padding:11px 14px;border-radius:12px;background:rgba(255,255,255,.12);font-weight:600;font-size:14px\">Dashboard<\u002Fa>\n      <a href=\"#calendar\" style=\"color:#dbeafe;text-decoration:none;padding:11px 14px;border-radius:12px;font-weight:600;font-size:14px\">Audit Calendar<\u002Fa>\n      <a href=\"#evidence\" style=\"color:#dbeafe;text-decoration:none;padding:11px 14px;border-radius:12px;font-weight:600;font-size:14px\">Proof of Audit<\u002Fa>\n      <a href=\"#scorecard\" style=\"color:#dbeafe;text-decoration:none;padding:11px 14px;border-radius:12px;font-weight:600;font-size:14px\">Scorecard<\u002Fa>\n      <a href=\"#capture\" style=\"color:#dbeafe;text-decoration:none;padding:11px 14px;border-radius:12px;font-weight:600;font-size:14px\">Audit Capture<\u002Fa>\n      <a href=\"#actions\" style=\"color:#dbeafe;text-decoration:none;padding:11px 14px;border-radius:12px;font-weight:600;font-size:14px\">Action Plan<\u002Fa>\n      <a href=\"#notifications\" style=\"color:#dbeafe;text-decoration:none;padding:11px 14px;border-radius:12px;font-weight:600;font-size:14px\">Notifications<\u002Fa>\n      <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ goAccess }}\" style=\"text-align:left;color:#dbeafe;text-decoration:none;padding:11px 14px;border-radius:12px;font-weight:600;font-size:14px;border:0;background:none;cursor:pointer;font-family:inherit\">Access &amp; Permissions<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fnav>\n    <div style=\"margin-top:auto;background:rgba(255,255,255,.1);padding:16px;border-radius:16px\">\n      <p style=\"font-size:11px;color:#B8C4D9;margin:0 0 6px\">Viewing dealer<\u002Fp>\n      <strong style=\"font-size:14px\">{{ selectedDealer }}<\u002Fstrong>\n      <p style=\"font-size:11px;color:#B8C4D9;margin:10px 0 2px\">Cloud sync<\u002Fp>\n      <strong style=\"font-size:12px;color:#86efac\">● {{ syncLabel }}<\u002Fstrong>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main style=\"margin-left:264px;padding:28px;width:calc(100% - 264px)\">\n\n    <section style=\"display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap\">\n      <div>\n        <p style=\"text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:#F28C28;font-weight:800;margin:0 0 6px\">Group Audit Dashboard<\u002Fp>\n        <h2 style=\"font-size:32px;margin:0;color:#0A2342;font-weight:800\">Dealership Audit Overview<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px;align-items:center;background:#f1f5f9;padding:5px;border-radius:999px\">\n        <button onclick=\"{{ goSlicerComplete }}\" style=\"border:0;background:#16A34A;color:#fff;padding:9px 14px;border-radius:999px;font-weight:800;cursor:pointer;font-size:12px;white-space:nowrap\">✓ Complete: {{ countComplete }}<\u002Fbutton>\n        <button onclick=\"{{ goSlicerPending }}\" style=\"border:0;background:#F59E0B;color:#fff;padding:9px 14px;border-radius:999px;font-weight:800;cursor:pointer;font-size:12px;white-space:nowrap\">◐ Pending: {{ countPending }}<\u002Fbutton>\n        <button onclick=\"{{ goSlicerToStart }}\" style=\"border:0;background:#64748b;color:#fff;padding:9px 14px;border-radius:999px;font-weight:800;cursor:pointer;font-size:12px;white-space:nowrap\">○ To Start: {{ countToStart }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <sc-if value=\"{{ hasOverdueFlags }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"background:#fef2f2;border:1px solid #fecaca;border-radius:18px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:10px\">\n        <span style=\"font-size:20px\">🚩<\u002Fspan>\n        <p style=\"margin:0;font-size:13px;color:#7f1d1d;font-weight:700\">{{ overdueFlagText }}<\u002Fp>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <section style=\"display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:14px;flex-wrap:wrap\">\n      <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap\">\n        <select value=\"{{ selectedDealer }}\" onchange=\"{{ handleDealerSelect }}\" style=\"border:1px solid #d1d5db;border-radius:12px;padding:11px 14px;font-family:inherit;font-weight:700;color:#0A2342;background:#fff;min-width:240px\">\n          \n            <option value=\"{{ d }}\">{{ d }}<\u002Foption>\n          \n        <\u002Fselect>\n        <span style=\"background:#e2e8f0;color:#0A2342;padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700\">{{ dealerRegionBrand }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap\">\n        <button onclick=\"{{ resetSelected }}\" style=\"border:1px solid #d1d5db;background:#fff;color:#0A2342;padding:11px 16px;border-radius:12px;font-weight:700;cursor:pointer\">Reset Dept<\u002Fbutton>\n        <button onclick=\"{{ completeAudit }}\" style=\"border:0;background:#F28C28;color:#fff;padding:11px 16px;border-radius:12px;font-weight:700;cursor:pointer\">Complete Audit<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap\">\n      <sc-for list=\"{{ d               <td style=\"border-bottom:1px solid #e5e7eb;padding:10px;font-size:13px\"><input type=\"date\" value=\"{{ r.DueDate }}\" onchange=\"{{ r.setDue }}\" style=\"border:1px solid #d1d5db;border-radius:10px;padding:8px;font-family:inherit\"><\u002Ftd>\n                  <td style=\"border-bottom:1px solid #e5e7eb;padding:10px;font-size:13px\">\n                    <select value=\"{{ r.Status }}\" onchange=\"{{ r.setStatus }}\" style=\"border:1px solid #d1d5db;border-radius:10px;padding:8px;font-family:inherit\">\n                      <option value=\"Open\">Open<\u002Foption>\n                      <option value=\"In Progress\">In Progress<\u002Foption>\n                      <option value=\"Closed\">Closed<\u002Foption>\n                    <\u002Fselect>\n                  <\u002Ftd>\n                  <td style=\"border-bottom:1px solid #e5e7eb;padding:10px;font-size:13px\">\n                    <sc-if value=\"{{ r.hasFlag }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"display:inline-block;color:#fff;padding:4px 8px;border-radius:8px;font-weight:800;font-size:10px;background:#DC2626;white-space:nowrap\">🚩 {{ r.flagText }}<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;margin-top:16px;flex-wrap:wrap\">\n          <button onclick=\"{{ exportDeptExcel }}\" style=\"border:0;background:#0A2342;color:#fff;padding:11px 16px;border-radius:12px;font-weight:700;cursor:pointer\">⬇ Download Excel<\u002Fbutton>\n          <button onclick=\"{{ exportDeptPDF }}\" style=\"border:1px solid #d1d5db;background:#fff;color:#0A2342;padding:11px 16px;border-radius:12px;font-weight:700;cursor:pointer\">⬇ Download PDF<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section id=\"actions\" style=\"background:#fff;border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,.08);border:1px solid #e5e7eb;margin-bottom:22px\">\n        <p style=\"text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:#F28C28;font-weight:800;margin:0 0 6px\">Action Plan<\u002Fp>\n        <h3 style=\"margin:0 0 14px;font-size:20px;color:#0A2342;font-weight:800\">Management Follow-Up Tracker<\u002Fh3>\n        <p style=\"font-size:12px;color:#64748b;margin:0 0 14px\">Assigned owners have 24h to give feedback and 72h to rectify. Overdue items flag automatically below and on the dealer banner.<\u002Fp>\n        <div style=\"display:grid;gap:12px\">\n          <sc-for list=\"{{ actionItems }}\" as=\"a\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:1fr 120px 140px 120px 130px;gap:12px;align-items:center;background:{{ a.rowBg }};border:1px solid #e2e8f0;padding:14px;border-radius:14px\">\n              <div><strong style=\"color:#0A2342;font-size:13px\">{{ a.Section }}<\u002Fstrong><br><span style=\"font-size:13px\">{{ a.Question }}<\u002Fspan><br><small style=\"color:#64748b\">{{ a.CorrectiveDisplay }}<\u002Fsmall><\u002Fdiv>\n              <div style=\"font-size:13px\">Score: <strong>{{ a.scorePct }}%<\u002Fstrong><\u002Fdiv>\n              <div style=\"font-size:13px\">Owner: <strong>{{ a.OwnerDisplay }}<\u002Fstrong><\u002Fdiv>\n              <div><span style=\"display:inline-block;color:#fff;padding:6px 12px;border-radius:999px;font-weight:800;font-size:12px;background:{{ a.statusColor }}\">{{ a.StatusDisplay }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:4px\">\n                <sc-if value=\"{{ a.hasFlag }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"display:inline-block;color:#fff;padding:4px 8px;border-radius:8px;font-weight:800;font-size:10px;background:#DC2626\">🚩 {{ a.flagText }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ a.showFeedbackBtn }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ a.markFeedback }}\" style=\"border:1px solid #d1d5db;background:#fff;color:#0A2342;padding:5px 8px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer\">Mark Feedback Given<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noActions }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#eff6ff;border-left:5px solid #2563eb;padding:14px;border-radius:14px;font-size:13px\">No action items.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <section id=\"notifications\" style=\"background:#fff;border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,.08);border:1px solid #e5e7eb;margin-bottom:40px\">\n      <p style=\"text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:#F28C28;font-weight:800;margin:0 0 6px\">Audit Notifications<\u002Fp>\n      <h3 style=\"margin:0 0 14px;font-size:20px;color:#0A2342;font-weight:800\">Email &amp; WhatsApp Alerts<\u002Fh3>\n      <p style=\"font-size:12px;color:#64748b;margin:0 0 14px\">Simulated delivery log — in production this is wired to your email/WhatsApp provider (e.g. via a Netlify Function + Twilio/SendGrid) using the addresses set on the Access page.<\u002Fp>\n      <div style=\"display:grid;gap:10px\">\n        <sc-for list=\"{{ notifications }}\" as=\"n\" hint-placeholder-count=\"0\">\n          <div style=\"background:#eff6ff;border-left:5px solid #2563eb;padding:14px;border-radius:14px;font-size:13px\" dangerouslysetinnerhtml=\"{{ n.html }}\"><\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noNotifications }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#eff6ff;border-left:5px solid #2563eb;padding:14px;border-radius:14px;font-size:13px\">System ready. Complete a department audit to generate a notification.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isSlicerRoute }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"min-height:100vh;padding:32px 40px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px\">\n      <div>\n        <button onclick=\"{{ goDashboard }}\" style=\"border:0;background:none;color:#0A2342;font-weight:800;cursor:pointer;padding:0;margin-bottom:8px;font-size:13px\">← Back to Dashboard<\u002Fbutton>\n        <h2 style=\"margin:0;font-size:28px;color:#0A2342;font-weight:800\">{{ sliceTitle }}<\u002Fh2>\n        <p style=\"margin:6px 0 0;color:#64748b;font-size:13px\">Based on calendar audit dates and department completion.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n        <select value=\"{{ regionFilter }}\" onchange=\"{{ handleRegionFilter }}\" style=\"border:1px solid #d1d5db;border-radius:12px;padding:10px 14px;font-family:inherit;font-weight:600\">\n          \n            <option value=\"{{ r }}\">{{ r }}<\u002Foption>\n          \n        <\u002Fselect>\n        <select value=\"{{ brandFilter }}\" onchange=\"{{ handleBrandFilter }}\" style=\"border:1px solid #d1d5db;border-radius:12px;padding:10px 14px;font-family:inherit;font-weight:600\">\n          \n            <option value=\"{{ b }}\">{{ b }}<\u002Foption>\n          \n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px\">\n      <div style=\"background:#fff;border-radius:18px;padding:18px;border:1px solid #e5e7eb;text-align:center\">\n        <p style=\"margin:0 0 4px;color:#64748b;font-size:12px;font-weight:700\">✓ Complete<\u002Fp><strong style=\"font-size:26px;color:#16A34A\">{{ countComplete }}<\u002Fstrong>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:18px;padding:18px;border:1px solid #e5e7eb;text-align:center\">\n        <p style=\"margin:0 0 4px;color:#64748b;font-size:12px;font-weight:700\">◐ Pending<\u002Fp><strong style=\"font-size:26px;color:#F59E0B\">{{ countPending }}<\u002Fstrong>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:18px;padding:18px;border:1px solid #e5e7eb;text-align:center\">\n        <p style=\"margin:0 0 4px;color:#64748b;font-size:12px;font-weight:700\">○ To Start<\u002Fp><strong style=\"font-size:26px;color:#64748b\">{{ countToStart }}<\u002Fstrong>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:24px;padding:10px;border:1px solid #e5e7eb;overflow:auto\">\n      <sc-for list=\"{{ sliceRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse\">\n        <thead>\n          <tr>\n            <th style=\"background:#0A2342;color:#fff;text-align:left;padding:12px;font-size:13px;border-radius:10px 0 0 0\">Dealer<\u002Fth>\n            <th style=\"background:#0A2342;color:#fff;text-align:left;padding:12px;font-size:13px\">Region<\u002Fth>\n            <th style=\"background:#0A2342;color:#fff;text-align:left;padding:12px;font-size:13px\">Brand<\u002Fth>\n            <th style=\"background:#0A2342;color:#fff;text-align:left;padding:12px;font-size:13px\">Depts Complete<\u002Fth>\n            <th style=\"background:#0A2342;color:#fff;text-align:left;padding:12px;font-size:13px\">LPI<\u002Fth>\n            <th style=\"background:#0A2342;color:#fff;text-align:left;padding:12px;font-size:13px\">Next Audit<\u002Fth>\n            <th style=\"background:#0A2342;color:#fff;text-align:left;padding:12px;font-size:13px;border-radius:0 10px 0 0\">Open<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n              <td style=\"border-bottom:1px solid #e5e7eb;padding:10px 12px;font-size:13px;font-weight:800;color:#0A2342\">{{ row.name }}<\u002Ftd>\n              <td style=\"border-bottom:1px solid #e5e7eb;padding:10px 12px;font-size:13px\">{{ row.region }}<\u002Ftd>\n              <td style=\"border-bottom:1px solid #e5e7eb;padding:10px 12px;font-size:13px\">{{ row.brand }}<\u002Ftd>\n              <td style=\"border-bottom:1px solid #e5e7eb;padding:10px 12px;font-size:13px\">{{ row.deptsText }}<\u002Ftd>\n              <td style=\"border-bottom:1px solid #e5e7eb;padding:10px 12px;font-size:13px;font-weight:800\">{{ row.lpiText }}<\u002Ftd>\n              <td style=\"border-bottom:1px solid #e5e7eb;padding:10px 12px;font-size:13px\">{{ row.nextAudit }}<\u002Ftd>\n              <td style=\"border-bottom:1px solid #e5e7eb;padding:10px 12px;font-size:13px\"><button onclick=\"{{ row.open }}\" style=\"border:0;background:#0A2342;color:#fff;padding:7px 12px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px\">Open →<\u002Fbutton><\u002Ftd>\n            <\u002Ftr>\n          \n        <\u002Ftbody>\n      <\u002Ftable>\n      <sc-if value=\"{{ sliceEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"padding:20px;color:#94a3b8;font-size:13px\">No dealers match this filter.<\u002Fp>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isAccessRoute }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"min-height:100vh;padding:32px 40px;max-width:1000px;margin:0 auto\">\n    <button onclick=\"{{ goDashboard }}\" style=\"border:0;background:none;color:#0A2342;font-weight:800;cursor:pointer;padding:0;margin-bottom:8px;font-size:13px\">← Back to Dashboard<\u002Fbutton>\n    <h2 style=\"margin:0 0 6px;font-size:28px;color:#0A2342;font-weight:800\">Access &amp; Permissions<\u002Fh2>\n    <p style=\"margin:0 0 20px;color:#64748b;font-size:13px\">Grant whole-dashboard access, or scope a person to one dealership (Dealer Principal) or one department (Department Manager). Real login enforcement requires connecting this to an auth backend — see note below.<\u002Fp>\n\n    <div style=\"background:#fff;border-radius:20px;padding:20px;border:1px solid #e5e7eb;margin-bottom:20px\">\n      <h3 style=\"margin:0 0 14px;font-size:16px;color:#0A2342;font-weight:800\">Grant Access<\u002Fh3>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr 1fr auto;gap:10px;align-items:end\">\n        <div>\n          <p style=\"font-size:11px;color:#64748b;margin:0 0 4px;font-weight:700\">Email<\u002Fp>\n          <input placeholder=\"name@hatfieldgroup.co.za\" value=\"{{ newUserEmail }}\" onchange=\"{{ handleNewUserEmail }}\" style=\"border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-family:inherit;width:100%\">\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:11px;color:#64748b;margin:0 0 4px;font-weight:700\">Name<\u002Fp>\n          <input placeholder=\"Full name\" value=\"{{ newUserName }}\" onchange=\"{{ handleNewUserName }}\" style=\"border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-family:inherit;width:100%\">\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:11px;color:#64748b;margin:0 0 4px;font-weight:700\">Access Level<\u002Fp>\n          <select value=\"{{ newUserRole }}\" onchange=\"{{ handleNewUserRole }}\" style=\"border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-family:inherit;width:100%\">\n            <option value=\"admin\">Whole Dashboard<\u002Foption>\n            <option value=\"principal\">Dealer Principal<\u002Foption>\n            <option value=\"manager\">Department Manager<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:11px;color:#64748b;margin:0 0 4px;font-weight:700\">Dealer<\u002Fp>\n          <select value=\"{{ newUserDealer }}\" onchange=\"{{ handleNewUserDealer }}\" style=\"border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-family:inherit;width:100%\">\n            \n              <option value=\"{{ d }}\">{{ d }}<\u002Foption>\n            \n          <\u002Fselect>\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:11px;color:#64748b;margin:0 0 4px;font-weight:700\">Department<\u002Fp>\n          <select value=\"{{ newUserDept }}\" onchange=\"{{ handleNewUserDept }}\" style=\"border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;font-family:inherit;width:100%\">\n            \n              <option value=\"{{ dp }}\">{{ dp }}<\u002Foption>\n            \n          <\u002Fselect>\n        <\u002Fdiv>\n        <button onclick=\"{{ addUser }}\" style=\"border:0;background:#0A2342;color:#fff;padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer\">+ Add<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#fff;border-radius:20px;padding:20px;border:1px solid #e5e7eb;margin-bottom:20px\">\n      <h3 style=\"margin:0 0 14px;font-size:16px;color:#0A2342;font-weight:800\">People With Access<\u002Fh3>\n      <div style=\"display:grid;gap:8px\">\n        <sc-for list=\"{{ userRows }}\" as=\"u\" hint-placeholder-count=\"6\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 140px auto;gap:10px;align-items:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 14px\">\n            <div><strong style=\"font-size:13px;color:#0A2342\">{{ u.name }}<\u002Fstrong><br><span style=\"font-size:12px;color:#64748b\">{{ u.email }}<\u002Fspan><\u002Fdiv>\n            <span style=\"font-size:12px;color:#0A2342\">{{ u.scopeText }}<\u002Fspan>\n            <span style=\"display:inline-block;color:#fff;padding:5px 10px;border-radius:999px;font-weight:800;font-size:11px;background:{{ u.roleColor }};text-align:center\">{{ u.roleLabel }}<\u002Fspan>\n            <button onclick=\"{{ u.remove }}\" style=\"border:0;background:none;color:#DC2626;font-weight:700;cursor:pointer;font-size:12px\">Remove<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#fff;border-radius:20px;padding:20px;border:1px solid #e5e7eb\">\n      <h3 style=\"margin:0 0 10px;font-size:16px;color:#0A2342;font-weight:800\">Excel Import / Export<\u002Fh3>\n      <p style=\"font-size:12px;color:#64748b;margin:0 0 14px\">Download the template, fill it in (roster + audit questions per department), then upload it back to bulk-load data.<\u002Fp>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:center\">\n        <button onclick=\"{{ downloadTemplate }}\" style=\"border:0;background:#0A2342;color:#fff;padding:11px 16px;border-radius:12px;font-weight:700;cursor:pointer\">⬇ Download Excel Template<\u002Fbutton>\n        <label style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid #d1d5db;background:#fff;color:#0A2342;padding:11px 16px;border-radius:12px;font-weight:700;cursor:pointer\">\n          <span>⬆ Upload Filled Template<\u002Fspan>\n          <input type=\"file\" accept=\".xlsx,.xls\" onchange=\"{{ handleImport }}\" style=\"display:none\">\n        <\u002Flabel>\n        <span style=\"font-size:12px;color:{{ importMsgColor }}\">{{ importMsg }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst DEPARTMENTS = [\"New Car Sales\",\"Used Car Sales\",\"Service Department\",\"Parts Department\"];\nconst WEEKDAYS = [\"Su\",\"Mo\",\"Tu\",\"We\",\"Th\",\"Fr\",\"Sa\"];\n\nclass Component extends DCLogic {\n  somersetRows = [{\"Section\":\"Contact by Telephone\",\"Weight\":0.1,\"Question\":\"Was the call answered within an acceptable time?\",\"Score\":0.8,\"Evidence\":\"Call answered, appointment setting, contact details, initial needs question.\",\"Corrective\":\"\",\"Owner\":\"\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Contact by Telephone\",\"Weight\":0.1,\"Question\":\"Was the responsible staff member reached?\",\"Score\":0.8,\"Evidence\":\"Yes\",\"Corrective\":\"\",\"Owner\":\"\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Contact by Telephone\",\"Weight\":0.1,\"Question\":\"Was a concrete appointment agreed?\",\"Score\":0,\"Evidence\":\"Yes, only to be asked on the call if I am serious that I will be coming to view the car\",\"Corrective\":\"Coach consultant on closing appointments firmly.\",\"Owner\":\"J. Naidoo\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Contact by Telephone\",\"Weight\":0.1,\"Question\":\"Were customer contact details captured?\",\"Score\":0,\"Evidence\":\"No follow-up received yet.\",\"Corrective\":\"Enforce CRM capture at point of call.\",\"Owner\":\"J. Naidoo\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Welcome Experience\",\"Weight\":0.1,\"Question\":\"Was customer greeted within 2 minutes of arrival?\",\"Score\":0.7,\"Evidence\":\"Yes\",\"Corrective\":\"\",\"Owner\":\"\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Welcome Experience\",\"Weight\":0.1,\"Question\":\"Was a beverage offered?\",\"Score\":0.6,\"Evidence\":\"Yes\",\"Corrective\":\"\",\"Owner\":\"\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Showroom Standards\",\"Weight\":0.15,\"Question\":\"Were vehicles clean and correctly priced?\",\"Score\":0.9,\"Evidence\":\"Yes\",\"Corrective\":\"\",\"Owner\":\"\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Needs Analysis\",\"Weight\":0.15,\"Question\":\"Was a structured needs analysis conducted?\",\"Score\":0.4,\"Evidence\":\"Partial - rushed.\",\"Corrective\":\"Retrain on needs analysis structure.\",\"Owner\":\"T. Botha\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Test Drive\",\"Weight\":0.1,\"Question\":\"Was a test drive offered and completed?\",\"Score\":1,\"Evidence\":\"Yes\",\"Corrective\":\"\",\"Owner\":\"\",\"DueDate\":\"\",\"Status\":\"Open\"},{\"Section\":\"Follow-Up\",\"Weight\":0.1,\"Question\":\"Was a follow-up call/email scheduled?\",\"Score\":0.2,\"Evidence\":\"None received within 5 days.\",\"Corrective\":\"Set mandatory 48h follow-up task in CRM.\",\"Owner\":\"T. Botha\",\"DueDate\":\"\",\"Status\":\"Open\"}];\n\n  regionFor(name){\n    if(name.includes(\"Somerset\") || name.includes(\"N1 City\") || name.includes(\"Tygervalley\") || name.includes(\"Cape Gate\")) return \"Western Cape\";\n    return \"Gauteng\";\n  }\n  brandFor(name){\n    if(name.startsWith(\"Audi\")) return \"Audi\";\n    if(name.startsWith(\"JAECOO\")) return \"JAECOO\";\n    if(name.startsWith(\"Jetour\")) return \"Jetour\";\n    return \"Other\";\n  }\n  slug(name){ return name.toLowerCase().replace(/[^a-z0-9]+/g,\".\"); }\n  deptSlug(d){ return d.toLowerCase().replace(/[^a-z0-9]+/g,\"\"); }\n\n  initDealers(){\n    const names = [\"Audi Centre Somerset West\",\"Audi Hatfield\",\"Audi Braamfontein\",\"Audi Rivonia\",\"JAECOO N1 City\",\"Jetour Tygervalley\",\"Jetour Cape Gate\"];\n    return names.map(name => {\n      const s = this.slug(name);\n      const managers = {};\n      DEPARTMENTS.forEach(d => { managers[d] = this.deptSlug(d) + \".\" + s + \"@hatfieldgroup.co.za\"; });\n      return { name, region: this.regionFor(name), brand: this.brandFor(name), principalEmail: \"principal.\" + s + \"@hatfieldgroup.co.za\", managers, nextAudit: \"\", followUp: \"\" };\n    });\n  }\n\n  emptyDept(){ return { rows: [], completedAt: null, visitDate: \"\", consultant: \"\" }; }\n  emptyEvidence(){ return { footage: [], email: [], whatsapp: [] }; }\n\n  initAuditByDealer(dealers){\n    const map = {};\n    dealers.forEach(dl => {\n      map[dl.name] = {};\n      DEPARTMENTS.forEach(d => { map[dl.name][d] = this.emptyDept(); });\n    });\n    map[dealers[0].name][\"New Car Sales\"] = { rows: JSON.parse(JSON.stringify(this.somersetRows)), completedAt: null, visitDate: \"2026-06-13\", consultant: \"JP / Monroe\" };\n    return map;\n  }\n  initEvidenceByDealer(dealers){\n    const map = {};\n    dealers.forEach(dl => { map[dl.name] = {}; DEPARTMENTS.forEach(d => { map[dl.name][d] = this.emptyEvidence(); }); });\n    return map;\n  }\n  initUsers(dealers){\n    const users = [\n      { email: \"admin@hatfieldgroup.co.za\", name: \"Group Admin\", role: \"admin\", dealer: null, department: null },\n      { email: \"chris@leegra.co.za\", name: \"Chris\", role: \"admin\", dealer: null, department: null }\n    ];\n    dealers.forEach(dl => {\n      users.push({ email: dl.principalEmail, name: dl.name + \" Principal\", role: \"principal\", dealer: dl.name, department: null });\n      DEPARTMENTS.forEach(d => {\n        users.push({ email: dl.managers[d], name: d + \" Manager — \" + dl.name, role: \"manager\", dealer: dl.name, department: d });\n      });\n    });\n    return users;\n  }\n\n  loadPersisted(){\n    try {\n      const raw = localStorage.getItem(\"leegra_audit_cloud_v1\");\n      if(!raw) return null;\n      const data = JSON.parse(raw);\n      if(Array.isArray(data.notifications)){\n        data.notifications = data.notifications.map(n => (n && typeof n.html === \"string\") ? { html: { __html: n.html } } : n);\n      }\n      if(Array.isArray(data.users) && !data.users.some(u => u.email.toLowerCase() === \"chris@leegra.co.za\")){\n        data.users = [...data.users, { email: \"chris@leegra.co.za\", name: \"Chris\", role: \"admin\", dealer: null, department: null }];\n      }\n      return data;\n    } catch(e){}\n    return null;\n  }\n  persist(){\n    try {\n      const { dealers, auditByDealer, users, notifications } = this.state;\n      localStorage.setItem(\"leegra_audit_cloud_v1\", JSON.stringify({ dealers, auditByDealer, users, notifications, savedAt: Date.now() }));\n    } catch(e){}\n  }\n\n  constructor(props){\n    super(props);\n    const dealers = this.initDealers();\n    const persisted = this.loadPersisted();\n    this.state = {\n      currentUser: null,\n      loginEmail: \"\",\n      loginError: \"\",\n      route: \"dashboard\",\n      sliceType: \"complete\",\n      dealers: persisted?.dealers || dealers,\n      users: persisted?.users || this.initUsers(dealers),\n      auditByDealer: persisted?.auditByDealer || this.initAuditByDealer(dealers),\n      evidenceByDealer: this.initEvidenceByDealer(dealers),\n      selectedDealer: dealers[0].name,\n      activeDept: DEPARTMENTS[0],\n      search: \"\",\n      regionFilter: \"All Regions\",\n      brandFilter: \"All Brands\",\n      calendarMonth: new Date().getMonth(),\n      calendarYear: new Date().getFullYear(),\n      notifications: persisted?.notifications || [],\n      newUserEmail: \"\", newUserName: \"\", newUserRole: \"manager\", newUserDealer: dealers[0].name, newUserDept: DEPARTMENTS[0],\n      importMsg: \"\", importMsgColor: \"#64748b\"\n    };\n  }\n\n  componentDidMount(){\n    this._timer = setInterval(() => this.forceUpdate(), 60000);\n  }\n  componentWillUnmount(){\n    if(this._timer) clearInterval(this._timer);\n  }\n\n  pct(v){ return Math.round((Number(v)||0)*100); }\n  statusColor(score){\n    if(score >= 0.85) return \"#16A34A\";\n    if(score >= 0.70) return \"#F59E0B\";\n    return \"#DC2626\";\n  }\n  statusText(score){\n    if(score >= 0.85) return \"Best Practice\";\n    if(score >= 0.70) return \"Needs Improvement\";\n    return \"Critical\";\n  }\n  recommendation(score){\n    if(score < 0.5) return \"Immediate manager intervention, staff training and daily follow-up required.\";\n    if(score < 0.7) return \"Improve process discipline and track weekly.\";\n    if(score < 0.85) return \"Maintain momentum and close remaining gaps.\";\n    return \"Best practice. Use as benchmark.\";\n  }\n  groupSections(rows){\n    const map = {};\n    rows.forEach(r=>{\n      const s = r.Section || \"Unassigned\";\n      if(!map[s]) map[s] = { section:s, weight:Number(r.Weight)||0, sum:0, count:0 };\n      map[s].sum += Number(r.Score) || 0;\n      map[s].count += 1;\n    });\n    return Object.values(map).map(x=>({ ...x, score: x.count ? x.sum/x.count : 0 }));\n  }\n  calcOverall(rows){\n    if(!rows.length) return null;\n    const sections = this.groupSections(rows);\n    const totalWeight = sections.reduce((a,b)=>a+(Number(b.weight)||0),0) || 1;\n    return sections.reduce((a,b)=>a+(b.score*b.weight),0)/totalWeight;\n  }\n  dealerOverall(dealerName){\n    const depts = this.state.auditByDealer[dealerName] || {};\n    const scores = DEPARTMENTS.map(d => this.calcOverall((depts[d]||{}).rows || [])).filter(v => v !== null);\n    if(!scores.length) return null;\n    return scores.reduce((a,b)=>a+b,0)/scores.length;\n  }\n  completedDeptCount(dealerName){\n    const depts = this.state.auditByDealer[dealerName] || {};\n    return DEPARTMENTS.filter(d => (depts[d]||{}).completedAt).length;\n  }\n  today(){ const d = new Date(); d.setHours(0,0,0,0); return d; }\n  dealerStatus(dl){\n    const done = this.completedDeptCount(dl.name);\n    if(done === DEPARTMENTS.length) return \"complete\";\n    const next = dl.nextAudit ? new Date(dl.nextAudit) : null;\n    if(done > 0) return \"pending\";\n    if(next && next < this.today()) return \"pending\";\n    return \"tostart\";\n  }\n\n  findUser(email){\n    return this.state.users.find(u => u.email.toLowerCase() === (email||\"\").trim().toLowerCase());\n  }\n  handleLoginEmail(e){ this.setState({ loginEmail: e.target.value, loginError: \"\" }); }\n  handleLogin(){\n    const u = this.findUser(this.state.loginEmail);\n    if(!u){ this.setState({ loginError: \"No access found for that email. Ask your Group Admin to add you on the Access page.\" }); return; }\n    const patch = { currentUser: u, loginError: \"\" };\n    if(u.dealer) patch.selectedDealer = u.dealer;\n    if(u.department) patch.activeDept = u.department;\n    this.setState(patch);\n  }\n  handleLogout(){ this.setState({ currentUser: null, loginEmail: \"\", route: \"dashboard\" }); }\n\n  isAdmin(){ return this.state.currentUser && this.state.currentUser.role === \"admin\"; }\n  visibleDealers(){\n    const u = this.state.currentUser;\n    if(!u || u.role === \"admin\") return this.state.dealers;\n    return this.state.dealers.filter(d => d.name === u.dealer);\n  }\n\n  selectDealer(name){\n    const u = this.state.currentUser;\n    if(u && u.role === \"manager\" && u.dealer !== name) return;\n    if(u && u.role === \"principal\" && u.dealer !== name) return;\n    this.setState({ selectedDealer: name, search: \"\", route: \"dashboard\" });\n  }\n  handleDealerSelect(e){ this.selectDealer(e.target.value); }\n  selectDept(d){\n    const u = this.state.currentUser;\n    if(u && u.role === \"manager\" && u.department !== d) return;\n    this.setState({ activeDept: d, search: \"\" });\n  }\n  handleSearch(e){ this.setState({ search: e.target.value }); }\n  handleRegionFilter(e){ this.setState({ regionFilter: e.target.value }); }\n  handleBrandFilter(e){ this.setState({ brandFilter: e.target.value }); }\n\n  updateDealerField(name, field, value){\n    this.setState(s => ({ dealers: s.dealers.map(d => d.name === name ? { ...d, [field]: value } : d) }), () => this.persist());\n  }\n  updateAuditField(dealer, dept, idx, field, value){\n    this.setState(s => {\n      const rows = [...((s.auditByDealer[dealer]||{})[dept]?.rows || [])];\n      const row = { ...rows[idx], [field]: value };\n      if((field === \"Owner\" && value) || (field === \"Corrective\" && value)){\n        if(!row.assignedAt && row.Owner && row.Corrective) row.assignedAt = Date.now();\n      }\n      rows[idx] = row;\n      return { auditByDealer: { ...s.auditByDealer, [dealer]: { ...s.auditByDealer[dealer], [dept]: { ...s.auditByDealer[dealer][dept], rows } } } };\n    }, () => this.persist());\n  }\n  markFeedback(dealer, dept, idx){\n    this.setState(s => {\n      const rows = [...s.auditByDealer[dealer][dept].rows];\n      rows[idx] = { ...rows[idx], feedbackGiven: true };\n      return { auditByDealer: { ...s.auditByDealer, [dealer]: { ...s.auditByDealer[dealer], [dept]: { ...s.auditByDealer[dealer][dept], rows } } } };\n    }, () => this.persist());\n  }\n  resetSelected(){\n    if(!confirm(\"Reset this department's audit data for \" + this.state.selectedDealer + \"?\")) return;\n    const { selectedDealer, activeDept } = this.state;\n    this.setState(s => ({\n      auditByDealer: { ...s.auditByDealer, [selectedDealer]: { ...s.auditByDealer[selectedDealer], [activeDept]: this.emptyDept() } }\n    }), () => this.persist());\n  }\n  addEvidence(dealer, dept, cat, fileList){\n    const files = Array.from(fileList || []);\n    if(!files.length) return;\n    const items = files.map(f => ({\n      id: Math.random().toString(36).slice(2),\n      name: f.name,\n      url: URL.createObjectURL(f),\n      isImage: f.type.startsWith(\"image/\"),\n      isVideo: f.type.startsWith(\"video/\"),\n      isOther: !f.type.startsWith(\"image/\") && !f.type.startsWith(\"video/\")\n    }));\n    this.setState(s => {\n      const dEv = s.evidenceByDealer[dealer] || {};\n      const catEv = dEv[dept] || this.emptyEvidence();\n      return { evidenceByDealer: { ...s.evidenceByDealer, [dealer]: { ...dEv, [dept]: { ...catEv, [cat]: [...catEv[cat], ...items] } } } };\n    });\n  }\n  removeEvidence(dealer, dept, cat, id){\n    this.setState(s => {\n      const dEv = s.evidenceByDealer[dealer] || {};\n      const catEv = dEv[dept] || this.emptyEvidence();\n      const removed = catEv[cat].find(it => it.id === id);\n      if(removed) URL.revokeObjectURL(removed.url);\n      return { evidenceByDealer: { ...s.evidenceByDealer, [dealer]: { ...dEv, [dept]: { ...catEv, [cat]: catEv[cat].filter(it => it.id !== id) } } } };\n    });\n  }\n  completeAudit(){\n    const { selectedDealer, activeDept, auditByDealer, dealers } = this.state;\n    const rows = (auditByDealer[selectedDealer]||{})[activeDept]?.rows || [];\n    if(!rows.length){ alert(activeDept + \" has not been audited yet for \" + selectedDealer + \".\"); return; }\n    const overall = this.calcOverall(rows);\n    const dl = dealers.find(d => d.name === selectedDealer);\n    const mgrEmail = dl ? dl.managers[activeDept] : \"\";\n    const pEmail = dl ? dl.principalEmail : \"\";\n    const html = `<strong>${activeDept} Audit Completed: ${selectedDealer}<\u002Fstrong><br/>Score: ${this.pct(overall)}% • Status: ${this.statusText(overall)}<br/>📧 Email sent to ${mgrEmail} and ${pEmail}<br/>💬 WhatsApp sent to ${mgrEmail} and ${pEmail}`;\n    this.setState(s => ({\n      auditByDealer: { ...s.auditByDealer, [selectedDealer]: { ...s.auditByDealer[selectedDealer], [activeDept]: { ...s.auditByDealer[selectedDealer][activeDept], completedAt: Date.now() } } },\n      notifications: [{ html: { __html: html } }, ...s.notifications]\n    }), () => this.persist());\n  }\n\n  goSlicer(type){ return () => this.setState({ route: \"slicer\", sliceType: type }); }\n  goDashboard(){ this.setState({ route: \"dashboard\" }); }\n  goAccess(){ this.setState({ route: \"access\" }); }\n  prevMonth(){ this.setState(s => { let m=s.calendarMonth-1,y=s.calendarYear; if(m<0){m=11;y--;} return {calendarMonth:m,calendarYear:y}; }); }\n  nextMonth(){ this.setState(s => { let m=s.calendarMonth+1,y=s.calendarYear; if(m>11){m=0;y++;} return {calendarMonth:m,calendarYear:y}; }); }\n\n  handleNewUserEmail(e){ this.setState({ newUserEmail: e.target.value }); }\n  handleNewUserName(e){ this.setState({ newUserName: e.target.value }); }\n  handleNewUserRole(e){ this.setState({ newUserRole: e.target.value }); }\n  handleNewUserDealer(e){ this.setState({ newUserDealer: e.target.value }); }\n  handleNewUserDept(e){ this.setState({ newUserDept: e.target.value }); }\n  addUser(){\n    const { newUserEmail, newUserName, newUserRole, newUserDealer, newUserDept } = this.state;\n    if(!newUserEmail || !newUserName){ alert(\"Enter an email and name.\"); return; }\n    const user = { email: newUserEmail.trim(), name: newUserName.trim(), role: newUserRole, dealer: newUserRole === \"admin\" ? null : newUserDealer, department: newUserRole === \"manager\" ? newUserDept : null };\n    this.setState(s => ({ users: [...s.users.filter(u=>u.email.toLowerCase()!==user.email.toLowerCase()), user], newUserEmail: \"\", newUserName: \"\" }), () => this.persist());\n  }\n  removeUser(email){\n    this.setState(s => ({ users: s.users.filter(u => u.email !== email) }), () => this.persist());\n  }\n\n  downloadTemplate(){\n    if(typeof XLSX === \"undefined\"){ alert(\"Excel engine still loading, try again in a moment.\"); return; }\n    const wb = XLSX.utils.book_new();\n    const auditHeaders = [\"Dealer\",\"Department\",\"Section\",\"Weight (0-1)\",\"Question\",\"Score % (0-100)\",\"Evidence / Comments\",\"Corrective Action\",\"Owner\",\"Due Date (YYYY-MM-DD)\",\"Status (Open/In Progress/Closed)\"];\n    const auditExample = [[\"Audi Hatfield\",\"New Car Sales\",\"Contact by Telephone\",0.1,\"Was the call answered within an acceptable time?\",80,\"Call answered promptly.\",\"\",\"\",\"\",\"\"]];\n    const ws1 = XLSX.utils.aoa_to_sheet([auditHeaders, ...auditExample]);\n    XLSX.utils.book_append_sheet(wb, ws1, \"Audit Questions\");\n    const rosterHeaders = [\"Dealer\",\"Region\",\"Brand\",\"Principal Email\",\"New Car Sales Manager Email\",\"Used Car Sales Manager Email\",\"Service Department Manager Email\",\"Parts Department Manager Email\",\"Next Audit Date (YYYY-MM-DD)\",\"Follow-Up Date (YYYY-MM-DD)\"];\n    const rosterExample = this.state.dealers.map(d => [d.name, d.region, d.brand, d.principalEmail, d.managers[\"New Car Sales\"], d.managers[\"Used Car Sales\"], d.managers[\"Service Department\"], d.managers[\"Parts Department\"], d.nextAudit, d.followUp]);\n    const ws2 = XLSX.utils.aoa_to_sheet([rosterHeaders, ...rosterExample]);\n    XLSX.utils.book_append_sheet(wb, ws2, \"Dealer Roster\");\n    XLSX.writeFile(wb, \"Leegra_Audit_Import_Template.xlsx\");\n  }\n  handleImport(e){\n    const file = e.target.files[0];\n    if(!file) return;\n    if(typeof XLSX === \"undefined\"){ this.setState({ importMsg: \"Excel engine still loading, try again.\", importMsgColor: \"#DC2626\" }); return; }\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      try {\n        const wb = XLSX.read(ev.target.result, { type: \"array\" });\n        let updatedRows = 0, updatedDealers = 0;\n        if(wb.SheetNames.includes(\"Dealer Roster\")){\n          const rows = XLSX.utils.sheet_to_json(wb.Sheets[\"Dealer Roster\"]);\n          this.setState(s => {\n            const dealers = s.dealers.map(d => {\n              const match = rows.find(r => (r[\"Dealer\"]||\"\").trim() === d.name);\n              if(!match) return d;\n              updatedDealers++;\n              return {\n                ...d,\n                region: match[\"Region\"] || d.region,\n                brand: match[\"Brand\"] || d.brand,\n                principalEmail: match[\"Principal Email\"] || d.principalEmail,\n                managers: {\n                  \"New Car Sales\": match[\"New Car Sales Manager Email\"] || d.managers[\"New Car Sales\"],\n                  \"Used Car Sales\": match[\"Used Car Sales Manager Email\"] || d.managers[\"Used Car Sales\"],\n                  \"Service Department\": match[\"Service Department Manager Email\"] || d.managers[\"Service Department\"],\n                  \"Parts Department\": match[\"Parts Department Manager Email\"] || d.managers[\"Parts Department\"]\n                },\n                nextAudit: match[\"Next Audit Date (YYYY-MM-DD)\"] || d.nextAudit,\n                followUp: match[\"Follow-Up Date (YYYY-MM-DD)\"] || d.followUp\n              };\n            });\n            return { dealers };\n          });\n        }\n        if(wb.SheetNames.includes(\"Audit Questions\")){\n          const rows = XLSX.utils.sheet_to_json(wb.Sheets[\"Audit Questions\"]);\n          this.setState(s => {\n            const auditByDealer = JSON.parse(JSON.stringify(s.auditByDealer));\n            rows.forEach(r => {\n              const dealer = (r[\"Dealer\"]||\"\").trim();\n              const dept = (r[\"Department\"]||\"\").trim();\n              if(!auditByDealer[dealer] || !auditByDealer[dealer][dept]) return;\n              auditByDealer[dealer][dept].rows.push({\n                Section: r[\"Section\"] || \"Unassigned\",\n                Weight: Number(r[\"Weight (0-1)\"]) || 0.1,\n                Question: r[\"Question\"] || \"\",\n                Score: (Number(r[\"Score % (0-100)\"]) || 0) / 100,\n                Evidence: r[\"Evidence / Comments\"] || \"\",\n                Corrective: r[\"Corrective Action\"] || \"\",\n                Owner: r[\"Owner\"] || \"\",\n                DueDate: r[\"Due Date (YYYY-MM-DD)\"] || \"\",\n                Status: r[\"Status (Open/In Progress/Closed)\"] || \"Open\"\n              });\n              updatedRows++;\n            });\n            return { auditByDealer };\n          }, () => this.persist());\n        }\n        this.setState({ importMsg: `Imported: ${updatedDealers} dealer rows, ${updatedRows} audit questions.`, importMsgColor: \"#16A34A\" });\n      } catch(err){\n        this.setState({ importMsg: \"Could not read file — check it matches the template.\", importMsgColor: \"#DC2626\" });\n      }\n    };\n    reader.readAsArrayBuffer(file);\n    e.target.value = \"\";\n  }\n\n  exportDeptExcel(){\n    const { selectedDealer, activeDept, auditByDealer } = this.state;\n    const rows = (auditByDealer[selectedDealer]||{})[activeDept]?.rows || [];\n    if(!rows.length){ alert(\"No audit data captured yet for \" + activeDept + \".\"); return; }\n    if(typeof XLSX === \"undefined\"){ alert(\"Excel engine still loading, try again.\"); return; }\n    const data = rows.map(r => ({ Section: r.Section, Question: r.Question, \"Score %\": this.pct(r.Score), Evidence: r.Evidence, \"Corrective Action\": r.Corrective, Owner: r.Owner, \"Due Date\": r.DueDate, Status: r.Status }));\n    const ws = XLSX.utils.json_to_sheet(data);\n    const wb = XLSX.utils.book_new();\n    XLSX.utils.book_append_sheet(wb, ws, activeDept.slice(0,28));\n    XLSX.writeFile(wb, selectedDealer.replace(/\\s+/g,\"_\") + \"_\" + activeDept.replace(/\\s+/g,\"_\") + \".xlsx\");\n  }\n  exportDeptPDF(){\n    const { selectedDealer, activeDept, auditByDealer } = this.state;\n    const rows = (auditByDealer[selectedDealer]||{})[activeDept]?.rows || [];\n    if(!rows.length){ alert(\"No audit data captured yet for \" + activeDept + \".\"); return; }\n    const overall = this.calcOverall(rows);\n    const rowsHtml = rows.map(r => `<tr><td>${r.Section}<\u002Ftd><td>${r.Question}<\u002Ftd><td>${this.pct(r.Score)}%<\u002Ftd><td>${r.Evidence||\"\"}<\u002Ftd><td>${r.Corrective||\"\"}<\u002Ftd><td>${r.Owner||\"\"}<\u002Ftd><td>${r.Status||\"\"}<\u002Ftd><\u002Ftr>`).join(\"\");\n    const html = `<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>${selectedDealer} - ${activeDept}<\u002Ftitle>\n      <style>body{font-family:Arial,Helvetica,sans-serif;padding:24px;color:#111}h1{color:#0A2342;font-size:20px}h2{color:#F28C28;font-size:13px;text-transform:uppercase}table{width:100%;border-collapse:collapse;margin-top:14px}th,td{border:1px solid #ccc;padding:8px;font-size:11px;text-align:left}th{background:#0A2342;color:#fff}<\u002Fstyle>\n      <\u002Fhead><body><h2>Leegra Dealership Audit<\u002Fh2><h1>${selectedDealer} — ${activeDept}<\u002Fh1><p>Overall Score: <strong>${this.pct(overall)}%<\u002Fstrong> (${this.statusText(overall)})<\u002Fp>\n      <table><thead><tr><th>Section<\u002Fth><th>Question<\u002Fth><th>Score<\u002Fth><th>Evidence<\u002Fth><th>Corrective Action<\u002Fth><th>Owner<\u002Fth><th>Status<\u002Fth><\u002Ftr><\u002Fthead><tbody>${rowsHtml}<\u002Ftbody><\u002Ftable>\n      <\u002Fbody><\u002Fhtml>`;\n    const w = window.open(\"\", \"_blank\");\n    w.document.write(html);\n    w.document.close();\n    setTimeout(() => w.print(), 400);\n  }\n\n  buildFlag(row){\n    if(!row.assignedAt) return { hasFlag: false, flagText: \"\" };\n    const hrs = (Date.now() - row.assignedAt) / 3600000;\n    if(!row.feedbackGiven && hrs > 24) return { hasFlag: true, flagText: \"Feedback overdue (24h)\" };\n    if((row.Status||\"\") !== \"Closed\" && hrs > 72) return { hasFlag: true, flagText: \"Rectification overdue (72h)\" };\n    return { hasFlag: false, flagText: \"\" };\n  }\n\n  renderVals(){\n    const { currentUser, loginEmail, loginError, route, sliceType, dealers, users, auditByDealer, evidenceByDealer, selectedDealer, activeDept, search, regionFilter, brandFilter, calendarMonth, calendarYear, notifications, newUserEmail, newUserName, newUserRole, newUserDealer, newUserDept, importMsg, importMsgColor } = this.state;\n\n    const isLoggedOut = !currentUser;\n    const isLoggedIn = !!currentUser;\n    const isDashboardRoute = isLoggedIn && route === \"dashboard\";\n    const isSlicerRoute = isLoggedIn && route === \"slicer\";\n    const isAccessRoute = isLoggedIn && route === \"access\" && currentUser && currentUser.role === \"admin\";\n    if(isLoggedIn && route === \"access\" && !(currentUser.role === \"admin\")){ /* fallback handled by isDashboardRoute below via state correction */ }\n\n    if(!isLoggedIn){\n      return {\n        isLoggedOut: true, isDashboardRoute: false, isSlicerRoute: false, isAccessRoute: false,\n        loginEmail, hasLoginError: !!loginError, loginError,\n        handleLoginEmail: (e)=>this.handleLoginEmail(e), handleLogin: ()=>this.handleLogin()\n      };\n    }\n\n    const visibleDealers = this.visibleDealers();\n    const dealerOptions = visibleDealers.map(d => d.name);\n    const isAdmin = currentUser.role === \"admin\";\n\n    const regionOptions = [\"All Regions\", ...Array.from(new Set(dealers.map(d=>d.region)))];\n    const brandOptions = [\"All Brands\", ...Array.from(new Set(dealers.map(d=>d.brand)))];\n\n    const filteredDealers = dealers.filter(d => {\n      if(regionFilter !== \"All Regions\" && d.region !== regionFilter) return false;\n      if(brandFilter !== \"All Brands\" && d.brand !== brandFilter) return false;\n      if(!isAdmin && d.name !== currentUser.dealer && currentUser.role !== \"admin\"){}\n      return true;\n    }).filter(d => isAdmin || d.name === currentUser.dealer);\n\n    // Ensure selectedDealer/activeDept valid for role scope\n    let effSelectedDealer = dealerOptions.includes(selectedDealer) ? selectedDealer : (dealerOptions[0] || dealers[0].name);\n    let effActiveDept = activeDept;\n    if(currentUser.role === \"manager\") { effSelectedDealer = currentUser.dealer; effActiveDept = currentUser.department; }\n    if(currentUser.role === \"principal\") { effSelectedDealer = currentUser.dealer; }\n\n    const dl = dealers.find(d => d.name === effSelectedDealer) || dealers[0];\n\n    // counts for slicer chips (respecting region/brand filter, all dealers visible to this user)\n    const statusOf = (d) => this.dealerStatus(d);\n    const scopedDealers = filteredDealers;\n    const countComplete = scopedDealers.filter(d => statusOf(d)===\"complete\").length;\n    const countPending = scopedDealers.filter(d => statusOf(d)===\"pending\").length;\n    const countToStart = scopedDealers.filter(d => statusOf(d)===\"tostart\").length;\n\n    // overdue flags across all rows visible to user, for banner\n    let overdueTotal = 0;\n    scopedDealers.forEach(d => {\n      const depts = auditByDealer[d.name] || {};\n      DEPARTMENTS.forEach(dep => {\n        (depts[dep]?.rows || []).forEach(r => { if(this.buildFlag(r).hasFlag) overdueTotal++; });\n      });\n    });\n\n    // dept tabs\n    const deptTabs = DEPARTMENTS.map(d => {\n      const rows = (auditByDealer[dl.name]||{})[d]?.rows || [];\n      const completed = !!(auditByDealer[dl.name]||{})[d]?.completedAt;\n      const disabled = currentUser.role === \"manager\" && currentUser.department !== d;\n      return {\n        name: d,\n        select: disabled ? (()=>{}) : (()=>this.selectDept(d)),\n        bg: d === effActiveDept ? \"#0A2342\" : \"#fff\",\n        color: d === effActiveDept ? \"#fff\" : \"#0A2342\",\n        dotColor: completed ? \"#16A34A\" : (rows.length ? \"#F59E0B\" : \"#94A3B8\")\n      };\n    });\n\n    // calendar\n    const monthNames = [\"January\",\"February\",\"March\",\"April\",\"May\",\"June\",\"July\",\"August\",\"September\",\"October\",\"November\",\"December\"];\n    const calendarMonthLabel = monthNames[calendarMonth] + \" \" + calendarYear;\n    const firstDay = new Date(calendarYear, calendarMonth, 1);\n    const startOffset = firstDay.getDay();\n    const daysInMonth = new Date(calendarYear, calendarMonth+1, 0).getDate();\n    const todayStr = new Date().toISOString().slice(0,10);\n    const eventsByDate = {};\n    scopedDealers.forEach(d => {\n      if(d.nextAudit) { (eventsByDate[d.nextAudit] = eventsByDate[d.nextAudit]||[]).push({ dealer: d.name, label: d.name.split(\" \")[0]+\" Audit\", type:\"audit\", color:\"#0A2342\" }); }\n      if(d.followUp) { (eventsByDate[d.followUp] = eventsByDate[d.followUp]||[]).push({ dealer: d.name, label: d.name.split(\" \")[0]+\" Follow-Up\", type:\"followup\", color:\"#F28C28\" }); }\n    });\n    const calendarCells = [];\n    for(let i=0;i<startOffset;i++){ calendarCells.push({ day:\"\", events:[], bg:\"#f8fafc\", borderColor:\"#f1f5f9\", dayColor:\"#cbd5e1\", select: ()=>{} }); }\n    for(let day=1; day<=daysInMonth; day++){\n      const dateStr = new Date(calendarYear, calendarMonth, day).toISOString().slice(0,10);\n      const evs = (eventsByDate[dateStr]||[]).map(ev => ({ ...ev }));\n      calendarCells.push({\n        day: String(day),\n        events: evs,\n        bg: dateStr === todayStr ? \"#fff7ed\" : \"#fff\",\n        borderColor: dateStr === todayStr ? \"#F28C28\" : \"#e5e7eb\",\n        dayColor: \"#0A2342\",\n        select: () => { if(evs.length) this.selectDealer(evs[0].dealer); }\n      });\n    }\n    const weekdayLabels = WEEKDAYS;\n    const agendaSource = Object.keys(eventsByDate).filter(k => k.startsWith(calendarYear + \"-\" + String(calendarMonth+1).padStart(2,\"0\"))).sort();\n    const agendaItems = [];\n    agendaSource.forEach(dateStr => {\n      (eventsByDate[dateStr]||[]).forEach(ev => {\n        agendaItems.push({ dealer: ev.dealer, detail: dateStr + \" • \" + (ev.type===\"audit\"?\"Next Audit\":\"Follow-Up\"), select: ()=>this.selectDealer(ev.dealer) });\n      });\n    });\n    const agendaLabel = agendaItems.length ? \"This month\" : \"No events\";\n    const agendaEmpty = agendaItems.length === 0;\n\n    // active dept data\n    const deptData = (auditByDealer[dl.name]||{})[effActiveDept] || this.emptyDept();\n    const rows = deptData.rows || [];\n    const hasData = rows.length > 0;\n\n    const overallScore = this.dealerOverall(dl.name);\n    const completedCount = this.completedDeptCount(dl.name);\n\n    let sections = [], critical = [], scorecardRows = [], auditRowsView = [], actionItems = [];\n    let questionCount = 0, openActions = 0, avgScore = 0, deptScore = null;\n    if(hasData){\n      deptScore = this.calcOverall(rows);\n      sections = this.groupSections(rows).sort((a,b)=>a.score-b.score).map(s => ({ section: s.section, pctText: this.pct(s.score) + \"%\", barColor: this.statusColor(s.score) }));\n      critical = this.groupSections(rows).filter(s => s.score < 0.7).sort((a,b)=>a.score-b.score).slice(0,5).map(s => ({ section: s.section, pctText: this.pct(s.score) + \"%\" }));\n      scorecardRows = this.groupSections(rows).map(s => ({ section: s.section, weightText: this.pct(s.weight) + \"%\", scoreText: this.pct(s.score) + \"%\", statusColor: this.statusColor(s.score), statusTxt: this.statusText(s.score), rec: this.recommendation(s.score) }));\n      const q = (search||\"\").toLowerCase();\n      auditRowsView = rows.map((r,i) => {\n        const flag = this.buildFlag(r);\n        return {\n          ...r, idx:i, scorePct: this.pct(r.Score), hasFlag: flag.hasFlag, flagText: flag.flagText,\n          setScore: (e)=>this.updateAuditField(dl.name,effActiveDept,i,\"Score\",Number(e.target.value)/100),\n          setEvidence: (e)=>this.updateAuditField(dl.name,effActiveDept,i,\"Evidence\",e.target.value),\n          setCorrective: (e)=>this.updateAuditField(dl.name,effActiveDept,i,\"Corrective\",e.target.value),\n          setOwner: (e)=>this.updateAuditField(dl.name,effActiveDept,i,\"Owner\",e.target.value),\n          setDue: (e)=>this.updateAuditField(dl.name,effActiveDept,i,\"DueDate\",e.target.value),\n          setStatus: (e)=>this.updateAuditField(dl.name,effActiveDept,i,\"Status\",e.target.value)\n        };\n      }).filter(r => !q || JSON.stringify(r).toLowerCase().includes(q));\n      actionItems = rows.map((r,i)=>({...r,idx:i})).filter(r => (Number(r.Score)||0) < 0.7 || (r.Corrective||\"\").trim()).map(r => {\n        const flag = this.buildFlag(r);\n        return {\n          ...r, scorePct: this.pct(r.Score), statusColor: this.statusColor(Number(r.Score)||0),\n          CorrectiveDisplay: r.Corrective || \"Add corrective action in audit capture.\",\n          OwnerDisplay: r.Owner || \"Unassigned\", StatusDisplay: r.Status || \"Open\",\n          hasFlag: flag.hasFlag, flagText: flag.flagText, rowBg: flag.hasFlag ? \"#fef2f2\" : \"#f8fafc\",\n          showFeedbackBtn: !!r.assignedAt && !r.feedbackGiven,\n          markFeedback: () => this.markFeedback(dl.name, effActiveDept, r.idx)\n        };\n      });\n      questionCount = rows.length;\n      openActions = rows.filter(r => (r.Status||\"\").toLowerCase() !== \"closed\").length;\n      avgScore = this.pct(rows.reduce((a,b)=>a+(Number(b.Score)||0),0) / rows.length);\n    }\n\n    // evidence\n    const dealerEvidence = (evidenceByDealer[dl.name]||{})[effActiveDept] || this.emptyEvidence();\n    const evidenceDefs = [\n      { key:\"footage\", label:\"Visit Footage & Photos\", hint:\"Video walkthrough or photos captured on-site during the audit.\", actionLabel:\"photos/videos\", accept:\"image/*,video/*\" },\n      { key:\"email\", label:\"Email Request Proof\", hint:\"Screenshot of the audit request email thread with the dealer.\", actionLabel:\"screenshot\", accept:\"image/*,video/*,.pdf\" },\n      { key:\"whatsapp\", label:\"WhatsApp Images\", hint:\"Photos or videos shared via WhatsApp as proof of audit.\", actionLabel:\"images/videos\", accept:\"image/*,video/*\" }\n    ];\n    const evidenceCategories = evidenceDefs.map(def => {\n      const items = (dealerEvidence[def.key] || []).map(it => ({ ...it, remove: () => this.removeEvidence(dl.name, effActiveDept, def.key, it.id) }));\n      return { ...def, items, empty: items.length === 0, onUpload: (e) => { this.addEvidence(dl.name, effActiveDept, def.key, e.target.files); e.target.value = \"\"; } };\n    });\n\n    // slicer page\n    const sliceLabelMap = { complete: \"✓ Complete Audits\", pending: \"◐ Pending Audits\", tostart: \"○ Audits to Start\" };\n    const sliceRows = scopedDealers.filter(d => statusOf(d) === sliceType).map(d => {\n      const score = this.dealerOverall(d.name);\n      const done = this.completedDeptCount(d.name);\n      return {\n        name: d.name, region: d.region, brand: d.brand,\n        deptsText: done + \" / \" + DEPARTMENTS.length,\n        lpiText: score !== null ? this.pct(score) + \"%\" : \"—\",\n        nextAudit: d.nextAudit || \"Not scheduled\",\n        open: () => this.selectDealer(d.name)\n      };\n    });\n\n    // access page\n    const userRows = users.map(u => ({\n      email: u.email, name: u.name,\n      scopeText: u.role === \"admin\" ? \"Whole Dashboard\" : (u.role === \"principal\" ? u.dealer : u.dealer + \" — \" + u.department),\n      roleLabel: u.role === \"admin\" ? \"Admin\" : (u.role === \"principal\" ? \"Principal\" : \"Manager\"),\n      roleColor: u.role === \"admin\" ? \"#0A2342\" : (u.role === \"principal\" ? \"#F28C28\" : \"#2563eb\"),\n      remove: () => this.removeUser(u.email)\n    }));\n\n    return {\n      isLoggedOut, isDashboardRoute, isSlicerRoute, isAccessRoute,\n      currentUserLabel: currentUser.name + \" (\" + (currentUser.role===\"admin\"?\"Admin\":currentUser.role===\"principal\"?\"Principal\":\"Manager\") + \")\",\n      handleLogout: ()=>this.handleLogout(),\n      isAdmin, goAccess: ()=>this.goAccess(),\n      syncLabel: \"Synced to browser storage\",\n\n      selectedDealer: dl.name,\n      dealerRegionBrand: dl.region + \" • \" + dl.brand,\n      dealerOptions,\n      handleDealerSelect: (e)=>this.handleDealerSelect(e),\n      resetSelected: ()=>this.resetSelected(),\n      completeAudit: ()=>this.completeAudit(),\n\n      countComplete, countPending, countToStart,\n      goSlicerComplete: ()=>this.goSlicer(\"complete\")(),\n      goSlicerPending: ()=>this.goSlicer(\"pending\")(),\n      goSlicerToStart: ()=>this.goSlicer(\"tostart\")(),\n      goDashboard: ()=>this.goDashboard(),\n\n      hasOverdueFlags: overdueTotal > 0,\n      overdueFlagText: overdueTotal + \" action item\" + (overdueTotal===1?\"\":\"s\") + \" past the 24h feedback or 72h rectification window across your dealers.\",\n\n      deptTabs, activeDept: effActiveDept,\n\n      regionFilter, brandFilter, regionOptions, brandOptions,\n      handleRegionFilter: (e)=>this.handleRegionFilter(e), handleBrandFilter: (e)=>this.handleBrandFilter(e),\n\n      calendarMonthLabel, weekdayLabels, calendarCells, agendaLabel, agendaItems, agendaEmpty,\n      prevMonth: ()=>this.prevMonth(), nextMonth: ()=>this.nextMonth(),\n\n      overallPctText: overallScore !== null ? this.pct(overallScore) + \"%\" : \"—\",\n      overallRingColor: overallScore !== null ? this.statusColor(overallScore) : \"#B7BDC7\",\n      dealerStatusText: completedCount === DEPARTMENTS.length ? \"All Departments Complete\" : (completedCount>0 ? completedCount + \"/\" + DEPARTMENTS.length + \" Departments Complete\" : \"Awaiting Audit Visit\"),\n      dealerStatusColor: completedCount === DEPARTMENTS.length ? \"#16A34A\" : (completedCount>0 ? \"#F59E0B\" : \"#94A3B8\"),\n      nextAudit: dl.nextAudit, followUp: dl.followUp,\n      nextAuditDisplay: dl.nextAudit || \"Not scheduled\", followUpDisplay: dl.followUp || \"Not scheduled\",\n      setNextAuditTop: (e)=>this.updateDealerField(dl.name,\"nextAudit\",e.target.value),\n      setFollowUpTop: (e)=>this.updateDealerField(dl.name,\"followUp\",e.target.value),\n      visitDate: deptData.visitDate || \"Not yet visited\", consultant: deptData.consultant || \"\",\n\n      hasData, hasNoData: !hasData,\n      sections, critical, noCritical: hasData && critical.length===0,\n      scorecardRows, auditRowsView, actionItems, noActions: hasData && actionItems.length===0,\n      search, handleSearch: (e)=>this.handleSearch(e),\n      questionCount, openActions, criticalCount: critical.length,\n      avgScoreText: hasData ? avgScore + \"%\" : \"—\",\n      exportDeptExcel: ()=>this.exportDeptExcel(), exportDeptPDF: ()=>this.exportDeptPDF(),\n\n      evidenceCategories,\n      notifications, noNotifications: notifications.length===0,\n\n      sliceTitle: sliceLabelMap[sliceType], sliceRows, sliceEmpty: sliceRows.length===0,\n\n      newUserEmail, newUserName, newUserRole, newUserDealer, newUserDept,\n      deptOptions: DEPARTMENTS,\n      handleNewUserEmail: (e)=>this.handleNewUserEmail(e), handleNewUserName: (e)=>this.handleNewUserName(e),\n      handleNewUserRole: (e)=>this.handleNewUserRole(e), handleNewUserDealer: (e)=>this.handleNewUserDealer(e), handleNewUserDept: (e)=>this.handleNewUserDept(e),\n      addUser: ()=>this.addUser(), userRows,\n      downloadTemplate: ()=>this.downloadTemplate(), handleImport: (e)=>this.handleImport(e),\n      importMsg, importMsgColor\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Dev-only diagnostics: log to console instead of a user-visible overlay —
  // a stray asset shouldn't read as a broken page to whoever's actually
  // using the dashboard.
  window.addEventListener('error', function(e) {
    console.warn('[bundle]', e.message || e.type, e.filename ? '(' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ase;\">Report Sections<\u002Fdiv>\n      <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"8\">\n        <div onclick=\"{{ selectSection }}\" data-key=\"{{ sec.key }}\" style=\"{{ sec.buttonStyle }}\">\n          <span style=\"{{ sec.dotStyle }}\"><\u002Fspan>\n          <span style=\"flex:1;\">{{ sec.label }}<\u002Fspan>\n          <span style=\"{{ sec.badgeStyle }}\">{{ sec.count }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"color:#6C7078; font-size:10.5px; font-weight:700; letter-spacing:0.8px; padding: 18px 8px 8px 8px; text-transform:uppercase;\">Filter: Store<\u002Fdiv>\n      <div style=\"max-height: 320px; overflow-y:auto; padding: 0 4px;\">\n        <sc-for list=\"{{ storeFilterOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n          <label style=\"display:flex; align-items:center; gap:6px; padding:3px 6px; border-radius:6px; cursor:pointer; color:#C9CCD1; font-size:11.5px; line-height:1.3;\" style-hover=\"background: rgba(255,255,255,0.06);\">\n            <input type=\"checkbox\" checked=\"{{ opt.checked }}\" onchange=\"{{ opt.toggle }}\" style=\"width:11px;height:11px;accent-color:#D71920;flex-shrink:0;\">\n            <span style=\"flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ opt.label }}<\u002Fspan>\n            <span style=\"color:#6C7078; font-size:10px;\">{{ opt.count }}<\u002Fspan>\n          <\u002Flabel>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding: 14px 14px 18px 14px; border-top: 1px solid rgba(255,255,255,0.08); display:flex; flex-direction:column; gap:8px;\">\n      <button onclick=\"{{ exportExcel }}\" style=\"display:flex; align-items:center; gap:8px; background:#2A2C31; color:#fff; border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:9px 12px; font-size:12.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:#38393F;\">\n        <span>⬇<\u002Fspan> Export Filtered Excel\n      <\u002Fbutton>\n      <label style=\"display:flex; align-items:center; gap:8px; background:#2A2C31; color:#fff; border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:9px 12px; font-size:12.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:#38393F;\">\n        <span>⬆<\u002Fspan> Import Excel / CSV\n        <input type=\"file\" accept=\".xlsx,.xls,.csv\" onchange=\"{{ importData }}\" style=\"display:none;\">\n      <\u002Flabel>\n      <button onclick=\"{{ resetFilters }}\" style=\"display:flex; align-items:center; justify-content:center; gap:8px; background:transparent; color:#9A9EA6; border:1px solid rgba(255,255,255,0.14); border-radius:8px; padding:8px 12px; font-size:12px; font-weight:600; cursor:pointer;\" style-hover=\"color:#fff; border-color:#D71920;\">\n        Reset Filters\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MAIN -->\n  <div style=\"flex:1; min-width:0; display:flex; flex-direction:column;\">\n\n    <!-- Top bar -->\n    <div style=\"display:flex; align-items:center; justify-content:space-between; padding: 16px 28px; background:#fff; border-bottom:1px solid #E5E7EB; position:sticky; top:0; z-index:5;\">\n      <div>\n        <div style=\"font-size:19px; font-weight:800; color:#15171B;\">{{ activeSectionLabel }}<\u002Fdiv>\n        <div style=\"font-size:12.5px; color:#6B7280; margin-top:2px;\">{{ activeSectionSub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <div style=\"background:#F4F5F7; border:1px solid #E5E7EB; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:700; color:#15171B; white-space:nowrap;\">{{ monthBadge }}<\u002Fdiv>\n        <div style=\"background:#15171B; border-radius:10px; padding:6px 12px; display:flex; align-items:center;\">\n          <image-slot id=\"leegra-logo\" style=\"width:90px;height:24px;\" shape=\"rect\" fit=\"contain\" src=\"bf52a1b1-2014-4065-bfba-c12a0b729676\" placeholder=\"Leegra logo\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Global cross filter toolbar -->\n    <div style=\"display:flex; gap:10px; flex-wrap:wrap; padding: 14px 28px; background:#fff; border-bottom:1px solid #E5E7EB;\">\n      <sc-for list=\"{{ crossFilters }}\" as=\"cf\" hint-placeholder-count=\"7\">\n        <div style=\"display:flex; flex-direction:column; gap:3px;\">\n          <span style=\"font-size:10px; font-weight:700; color:#8592A6; text-transform:uppercase; letter-spacing:0.4px;\">{{ cf.label }}<\u002Fspan>\n          <select onchange=\"{{ cf.onChange }}\" value=\"{{ cf.value }}\" style=\"border:1px solid #DCE3ED; border-radius:7px; padding:6px 10px; font-size:12.5px; font-weight:600; color:#1B2433; background:#F8FAFC; min-width:140px;\">\n            \n              <option value=\"{{ o }}\">{{ o }}<\u002Foption>\n            \n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"flex:1; padding: 22px 28px 40px 28px; overflow-y:auto;\">\n\n      <!-- KPI ROW -->\n      <sc-if value=\"{{ hasKpis }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:14px; margin-bottom:20px;\">\n          <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:16px 18px;\">\n              <div style=\"font-size:11px; font-weight:700; color:#8592A6; text-transform:uppercase; letter-spacing:0.4px;\">{{ k.label }}<\u002Fdiv>\n              <div style=\"font-size:24px; font-weight:800; color:#15171B; margin-top:6px;\">{{ k.value }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SECTION: Executive Summary -->\n      <sc-if value=\"{{ isExec }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid; grid-template-columns: 1.2fr 1fr; gap:16px; margin-bottom:16px;\">\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Executive Summary<\u002Fdiv>\n            <p style=\"font-size:12.5px; color:#3A4658; line-height:1.6; margin:0 0 10px 0;\">{{ execSummaryText1 }}<\u002Fp>\n            <p style=\"font-size:12.5px; color:#3A4658; line-height:1.6; margin:0;\">{{ execSummaryText2 }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Immediate Actions<\u002Fdiv>\n            <ul style=\"margin:0; padding-left:18px; font-size:12.5px; color:#3A4658; line-height:1.8;\">\n              <li><b>Recommendation recovery<\u002Fb> — mandatory Bridgestone product/value training where recommendation rate is below target.<\u002Fli>\n              <li><b>Incentivise first-recommendation<\u002Fb> — reward consultants and stores for leading with Bridgestone.<\u002Fli>\n              <li><b>Fix POSM cube compliance<\u002Fb> — monthly audits; replicate Supa Quick's 100% cube visibility elsewhere.<\u002Fli>\n              <li><b>Tighten stock availability<\u002Fb> — align inventory to recommendation demand to stop lost sales.<\u002Fli>\n              <li><b>Standardise needs analysis<\u002Fb> — 3+ discovery questions before any tyre recommendation.<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:16px;\">\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Brand Recommended<\u002Fdiv>\n            <sc-for list=\"{{ brandBars }}\" as=\"row\" hint-placeholder-count=\"5\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Region Coverage<\u002Fdiv>\n            <sc-for list=\"{{ regionBars }}\" as=\"row\" hint-placeholder-count=\"5\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SECTION: Store & Region -->\n      <sc-if value=\"{{ isStores }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px;\">\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">Stores Completed per Channel<\u002Fdiv>\n            <sc-for list=\"{{ channelTable }}\" as=\"row\" hint-placeholder-count=\"5\">\n                  <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n              <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Channel<\u002Fth><th style=\"{{ thStyleRight }}\">Records<\u002Fth><th style=\"{{ thStyleRight }}\">BS Rec %<\u002Fth><\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.name }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.count }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.bsRec }}<\u002Ftd><\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">Stores Completed per Region<\u002Fdiv>\n            <sc-for list=\"{{ regionTable }}\" as=\"row\" hint-placeholder-count=\"5\">\n                  <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n              <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Region<\u002Fth><th style=\"{{ thStyleRight }}\">Records<\u002Fth><th style=\"{{ thStyleRight }}\">BS Rec %<\u002Fth><\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.name }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.count }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.bsRec }}<\u002Ftd><\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n          <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">Store List (Active Filters)<\u002Fdiv>\n          <sc-for list=\"{{ storeListRows }}\" as=\"row\" hint-placeholder-count=\"8\">\n                <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n            <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Store<\u002Fth><th style=\"{{ thStyle }}\">Channel<\u002Fth><th style=\"{{ thStyle }}\">Region<\u002Fth><th style=\"{{ thStyle }}\">Shopper<\u002Fth><th style=\"{{ thStyle }}\">Brand Recommended<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.store }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.channel }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.region }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.shopper }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.brand }}<\u002Ftd><\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SECTION: Shopper & Car Demographic -->\n      <sc-if value=\"{{ isDemographic }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px;\">\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Gender<\u002Fdiv>\n            <sc-for list=\"{{ genderBars }}\" as=\"row\" hint-placeholder-count=\"3\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Age Group<\u002Fdiv>\n            <sc-for list=\"{{ ageBars }}\" as=\"row\" hint-placeholder-count=\"4\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:16px;\">\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Vehicle Type Used for Quotation<\u002Fdiv>\n            <sc-for list=\"{{ vehicleBars }}\" as=\"row\" hint-placeholder-count=\"4\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Competitor Mentioned<\u002Fdiv>\n            <sc-for list=\"{{ competitorBars }}\" as=\"row\" hint-placeholder-count=\"4\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SECTION: Brand Visibility / POSM -->\n      <sc-if value=\"{{ isVisibility }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px;\">\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">POSM Type<\u002Fdiv>\n            <sc-for list=\"{{ posmTypeBars }}\" as=\"row\" hint-placeholder-count=\"4\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">POSM by Region<\u002Fdiv>\n            <sc-for list=\"{{ posmRegionTable }}\" as=\"row\" hint-placeholder-count=\"5\">\n                  <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n              <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Region<\u002Fth><th style=\"{{ thStyleRight }}\">BS POSM %<\u002Fth><th style=\"{{ thStyleRight }}\">FS POSM %<\u002Fth><\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.name }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.bsPosm }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.fsPosm }}<\u002Ftd><\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n          <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">Granular POSM Detail<\u002Fdiv>\n          <sc-for list=\"{{ posmDetailRows }}\" as=\"row\" hint-placeholder-count=\"8\">\n                <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n            <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Store<\u002Fth><th style=\"{{ thStyle }}\">Channel<\u002Fth><th style=\"{{ thStyle }}\">BS Signage<\u002Fth><th style=\"{{ thStyle }}\">FS Signage<\u002Fth><th style=\"{{ thStyle }}\">BS POSM<\u002Fth><th style=\"{{ thStyle }}\">FS POSM<\u002Fth><th style=\"{{ thStyle }}\">POSM Type<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.store }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.channel }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.bsSign }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.fsSign }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.bsPosm }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.fsPosm }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.posmType }}<\u002Ftd><\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SECTION: Product Knowledge & Sales -->\n      <sc-if value=\"{{ isSales }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px;\">\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">Brands Recommended<\u002Fdiv>\n            <sc-for list=\"{{ brandBars }}\" as=\"row\" hint-placeholder-count=\"5\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:18px 20px;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; margin-bottom:12px;\">SKU Recommended<\u002Fdiv>\n            <sc-for list=\"{{ skuBars }}\" as=\"row\" hint-placeholder-count=\"5\">\n              <div style=\"margin-bottom:11px;\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#3A4658; margin-bottom:4px;\"><span>{{ row.name }}<\u002Fspan><span style=\"font-weight:700;\">{{ row.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px; background:#EEF1F6; border-radius:5px; overflow:hidden;\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n          <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">Sales Process Detail<\u002Fdiv>\n          <sc-for list=\"{{ salesDetailRows }}\" as=\"row\" hint-placeholder-count=\"8\">\n                <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n            <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Store<\u002Fth><th style=\"{{ thStyle }}\">Channel<\u002Fth><th style=\"{{ thStyle }}\">Brand Recommended<\u002Fth><th style=\"{{ thStyle }}\">SKU Recommended<\u002Fth><th style=\"{{ thStyle }}\">Price/Quality<\u002Fth><th style=\"{{ thStyleRight }}\">Price<\u002Fth><th style=\"{{ thStyle }}\">Promotion<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.store }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.channel }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.brand }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.sku }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.priceQuality }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.price }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.promoDetail }}<\u002Ftd><\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SECTION: Warranty & Guarantee -->\n      <sc-if value=\"{{ isWarranty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px;\">\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">What Warranty was Offered<\u002Fdiv>\n            <sc-for list=\"{{ warrantyTypeTable }}\" as=\"row\" hint-placeholder-count=\"4\">\n                  <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n              <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Warranty<\u002Fth><th style=\"{{ thStyleRight }}\">Records<\u002Fth><\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.name }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.count }}<\u002Ftd><\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n            <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">What Guarantee was Offered<\u002Fdiv>\n            <sc-for list=\"{{ guaranteeTypeTable }}\" as=\"row\" hint-placeholder-count=\"4\">\n                  <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n              <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Guarantee<\u002Fth><th style=\"{{ thStyleRight }}\">Records<\u002Fth><\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.name }}<\u002Ftd><td style=\"{{ tdStyleRight }}\">{{ row.count }}<\u002Ftd><\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E5E7EB; border-radius:14px; overflow:hidden;\">\n          <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 8px 18px;\">Granular Warranty &amp; Guarantee Detail<\u002Fdiv>\n          <sc-for list=\"{{ warrantyDetailRows }}\" as=\"row\" hint-placeholder-count=\"8\">\n                <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n            <thead><tr style=\"background:#F8FAFC;\"><th style=\"{{ thStyle }}\">Store<\u002Fth><th style=\"{{ thStyle }}\">Channel<\u002Fth><th style=\"{{ thStyle }}\">Warranty Offered<\u002Fth><th style=\"{{ thStyle }}\">Warranty Detail<\u002Fth><th style=\"{{ thStyle }}\">Guarantee Offered<\u002Fth><th style=\"{{ thStyle }}\">Guarantee Detail<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr style=\"border-top:1px solid #F1F3F7;\"><td style=\"{{ tdStyle }}\">{{ row.store }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.channel }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.warranty }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.warrantyDetail }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.guarantee }}<\u002Ftd><td style=\"{{ tdStyle }}\">{{ row.guaranteeDetail }}<\u002Ftd><\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SECTION: Store Drilldown / All Data -->\n      <sc-if value=\"{{ isDrill }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff; border:1px solid #E4E9F0; border-radius:14px; overflow:hidden;\">\n          <div style=\"font-size:13px; font-weight:700; color:#15171B; padding:16px 18px 4px 18px;\">All Imported Columns<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#8592A6; padding:0 18px 12px 18px;\">Showing {{ rawRows.length }} of {{ rawTotalCount }} records after filters.<\u002Fdiv>\n          <div style=\"overflow-x:auto;\">\n            <sc-for list=\"{{ allColumns }}\" as=\"c\" hint-placeholder-count=\"10\">\n                  <\u002Fsc-for><sc-for list=\"{{ rawRows }}\" as=\"row\" hint-placeholder-count=\"8\">\n                  <\u002Fsc-for><sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"10\">\n                      <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:11.5px; white-space:nowrap;\">\n              <thead><tr style=\"background:#F8FAFC;\">\n                <th style=\"{{ thStyle }}\">{{ c }}<\u002Fth>\n                \n              <\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid #F1F3F7;\">\n                    <td style=\"{{ tdStyle }}\">{{ cell }}<\u002Ftd>\n                    \n                  <\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst SECTION_DEFS = [\n  { key: 'exec', label: 'Executive Summary' },\n  { key: 'stores', label: 'Store & Region Details' },\n  { key: 'demographic', label: 'Shopper & Car Demographic' },\n  { key: 'visibility', label: 'Brand Visibility / POSM' },\n  { key: 'sales', label: 'Product Knowledge & Sales' },\n  { key: 'warranty', label: 'Warranty & Guarantee' },\n  { key: 'drill', label: 'Store Details' },\n];\nconst RED = '#D71920';\nconst ALIASES = {\n  month: ['month'], region: ['region'], province: ['province'], channel: ['channel'], store: ['store', 'store name', 'branch'], shopper: ['shopper'],\n  bsSign: ['bridgestone fixed signage availabe', 'bridgestone fixed signage available', 'bridgestone signage'],\n  fsSign: ['firestone fixed signageavailable', 'firestone fixed signage available', 'firestone signage'],\n  bsPosm: ['bridgestone posm', 'bs posm'], fsPosm: ['firestone posm'], posmType: ['posm type', 'type of posm', 'posm'],\n  brand: ['brand recommended', 'recommended brand', 'brand'], sku: ['sku recommended', 'recommended sku'],\n  bsStock: ['bridgestone stock', 'bs stock'], fsStock: ['firestone stock', 'fs stock'],\n  warranty: ['warranty offered', 'was a warranty offered', 'warranty'],\n  warrantyDetail: ['what warranty was offfered', 'what warranty was offered', 'warranty detail'],\n  guarantee: ['guaranty offered', 'guarantee offered', 'guaranty', 'guarantee'],\n  guaranteeDetail: ['what guaranty was offered', 'what guarantee was offered', 'guarantee detail', 'guaranty detail'],\n  promo: ['promotion mentioned', 'was any promotions mentioned', 'promo mentioned'],\n  promoDetail: ['what promotion promotion mentioned', 'what promotions was mentioned', 'what promotion mentioned', 'promotion detail'],\n  priceQuality: ['price or quality', 'price / quality'],\n  price: ['price of reccomended set of tires', 'price of recommended set of tires', 'price'],\n  gender: ['gender'], ageGroup: ['age group', 'age range', 'respondent age'], vehicleType: ['vehicle type', 'type of vehicle', 'vehicle used', 'vehicle'],\n  competitor: ['competitor mentioned', 'competitor'], competitorDetail: ['which competitor', 'competitor detail', 'competitor name'],\n};\nconst CROSS_FILTER_DEFS = [\n  ['month', 'Month'], ['region', 'Region'], ['province', 'Province'], ['channel', 'Channel'],\n  ['shopper', 'Shopper'], ['brand', 'Brand Recommended'], ['warranty', 'Warranty Offered'],\n  ['gender', 'Gender'], ['vehicleType', 'Vehicle Type'], ['competitor', 'Competitor Mentioned'],\n];\nfunction norm(s) { return String(s == null ? '' : s).replace(/\\s+/g, ' ').trim().toLowerCase(); }\nfunction clean(v) { return String(v == null ? '' : v).trim(); }\nfunction yes(v) { const s = norm(v); return ['yes', 'y', 'true', '1', 'available', 'offered', 'present'].some(x => s === x || s.indexOf(x) === 0); }\nfunction pct(n) { return (Number(n || 0) * 100).toFixed(0) + '%'; }\nfunction avg(a, fn) { return a.length ? a.reduce((s, r) => s + fn(r), 0) / a.length : 0; }\nfunction esc(v) { return String(v == null ? '' : v); }\n\nclass Component extends DCLogic {\n  state = {\n    rawData: [],\n    allColumns: [],\n    activeSection: 'exec',\n    storeFilter: null, // Set of selected store names, null = all\n    crossFilterValues: {},\n    loaded: false,\n  };\n\n  componentDidMount() {\n    const url = (window.__resources && window.__resources.bridgestoneXlsx) || 'bridgestone_import_data.xlsx';\n    this.loadFromXlsx(url);\n  }\n\n  loadFromXlsx(url) {\n    fetch(url).then(r => r.arrayBuffer()).then(buf => {\n      const wb = XLSX.read(buf, { type: 'array', cellDates: true });\n      this.ingestSheet(wb.Sheets[wb.SheetNames[0]]);\n    }).catch(() => { this.setState({ loaded: true }); });\n  }\n\n  ingestSheet(ws) {\n    const rows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });\n    const colSet = new Set();\n    rows.forEach(r => Object.keys(r).forEach(k => colSet.add(k)));\n    const allColumns = [...colSet];\n    const rawData = rows.map(r => Object.fromEntries(allColumns.map(c => [c, r[c] == null ? '' : r[c]])));\n    this._colCache = {};\n    this.setState({ rawData, allColumns, loaded: true, storeFilter: null, crossFilterValues: {} });\n  }\n\n  col(key) {\n    if (!this._colCache) this._colCache = {};\n    if (key in this._colCache) return this._colCache[key];\n    const allColumns = this.state.allColumns;\n    const list = ALIASES[key] || [key];\n    let found = null;\n    for (const a of list) { found = allColumns.find(c => norm(c) === norm(a)); if (found) break; }\n    if (!found) for (const a of list) {\n      const na = norm(a);\n      found = allColumns.find(c => {\n        const nc = norm(c);\n        const words = nc.split(' ');\n        return words.includes(na) || na.split(' ').every(w => words.includes(w));\n      });\n      if (found) break;\n    }\n    this._colCache[key] = found;\n    return found;\n  }\n\n  val(row, key) { const c = this.col(key); return c ? (row[c] == null ? '' : row[c]) : ''; }\n\n  monthName(v) {\n    if (v instanceof Date) return v.toLocaleString('en-ZA', { month: 'short', year: 'numeric' });\n    const s = clean(v);\n    if (!s) return '';\n    const m = s.match(/^([A-Za-z]{3,})[\\s-]?(\\d{2}|\\d{4})$/);\n    if (m) {\n      const monthNames = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];\n      const mi = monthNames.indexOf(m[1].slice(0, 3).toLowerCase());\n      if (mi !== -1) {\n        let year = parseInt(m[2], 10);\n        if (m[2].length === 2) year += 2000;\n        return new Date(year, mi, 1).toLocaleString('en-ZA', { month: 'short', year: 'numeric' });\n      }\n    }\n    const d = new Date(s);\n    return isNaN(d) ? s : d.toLocaleString('en-ZA', { month: 'short', year: 'numeric' });\n  }\n\n  group(rows, keyOrFn) {\n    return rows.reduce((m, r) => {\n      const k = clean(typeof keyOrFn === 'function' ? keyOrFn(r) : this.val(r, keyOrFn)) || 'Blank';\n      (m[k] = m[k] || []).push(r);\n      return m;\n    }, {});\n  }\n\n  selectSection(e) { this.setState({ activeSection: e.currentTarget.getAttribute('data-key') }); }\n\n  toggleStore(allStores, store) {\n    const cur = this.state.storeFilter;\n    let next;\n    if (!cur) { next = new Set(allStores); next.delete(store); }\n    else { next = new Set(cur); if (next.has(store)) next.delete(store); else next.add(store); }\n    this.setState({ storeFilter: next });\n  }\n\n  setCrossFilter(field, value) {\n    this.setState(s => ({ crossFilterValues: { ...s.crossFilterValues, [field]: value } }));\n  }\n\n  resetFilters() { this.setState({ storeFilter: null, crossFilterValues: {} }); }\n\n  importData(e) {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      const wb = XLSX.read(ev.target.result, { type: 'array', cellDates: true });\n      this.ingestSheet(wb.Sheets[wb.SheetNames[0]]);\n    };\n    reader.readAsArrayBuffer(file);\n  }\n\n  exportExcel() {\n    const rows = this.getFilteredRows();\n    const ws = XLSX.utils.json_to_sheet(rows, { header: this.state.allColumns });\n    const wb = XLSX.utils.book_new();\n    XLSX.utils.book_append_sheet(wb, ws, 'Filtered Dashboard Data');\n    XLSX.writeFile(wb, 'bridgestone_filtered_dashboard_export.xlsx');\n  }\n\n  getFilteredRows() {\n    const s = this.state;\n    let rows = s.rawData;\n    if (s.storeFilter) rows = rows.filter(r => s.storeFilter.has(clean(this.val(r, 'store'))));\n    const cf = s.crossFilterValues;\n    CROSS_FILTER_DEFS.forEach(([key]) => {\n      const v = cf[key];\n      if (v && v !== 'All') {\n        rows = rows.filter(r => (key === 'month' ? this.monthName(this.val(r, key)) : clean(this.val(r, key))) === v);\n      }\n    });\n    return rows;\n  }\n\n  topBars(groups, limit) {\n    const entries = Object.entries(groups).sort((a, b) => b[1].length - a[1].length).slice(0, limit || 12);\n    const max = Math.max(1, ...entries.map(e => e[1].length));\n    return entries.map(([name, arr]) => ({\n      name, count: arr.length,\n      barStyle: `height:100%; width:${(arr.length / max * 100).toFixed(1)}%; background:${RED}; border-radius:5px;`,\n    }));\n  }\n\n  renderVals() {\n    const s = this.state;\n    const active = s.activeSection;\n    const rows = this.getFilteredRows();\n\n    const sections = SECTION_DEFS.map(def => {\n      const isActive = def.key === active;\n      return {\n        key: def.key, label: def.label, count: rows.length,\n        buttonStyle: `display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:9px; cursor:pointer; margin-bottom:3px; font-size:12.5px; font-weight:600; color:${isActive ? '#fff' : '#B9BCC2'}; background:${isActive ? '#2A2C31' : 'transparent'};`,\n        dotStyle: `width:6px; height:6px; border-radius:50%; background:${isActive ? RED : '#4A4C52'};`,\n        badgeStyle: `font-size:10px; font-weight:700; color:${isActive ? '#fff' : '#7C7F86'}; background:${isActive ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)'}; padding:2px 7px; border-radius:20px;`,\n      };\n    });\n\n    // store sidebar filter (uses ALL rows minus cross filters, not store filter itself, so counts stay meaningful)\n    let storeSourceRows = s.rawData;\n    const cf = s.crossFilterValues;\n    CROSS_FILTER_DEFS.forEach(([key]) => {\n      const v = cf[key];\n      if (v && v !== 'All') storeSourceRows = storeSourceRows.filter(r => (key === 'month' ? this.monthName(this.val(r, key)) : clean(this.val(r, key))) === v);\n    });\n    const storeCounts = {};\n    storeSourceRows.forEach(r => { const st = clean(this.val(r, 'store')) || 'Blank'; storeCounts[st] = (storeCounts[st] || 0) + 1; });\n    const allStores = Object.keys(storeCounts).sort();\n    const storeFilterOptions = allStores.map(st => ({\n      label: st, count: storeCounts[st],\n      checked: s.storeFilter ? s.storeFilter.has(st) : true,\n      toggle: () => this.toggleStore(allStores, st),\n    }));\n\n    const crossFilters = CROSS_FILTER_DEFS.map(([key, label]) => {\n      const source = s.rawData.map(r => key === 'month' ? this.monthName(this.val(r, key)) : clean(this.val(r, key))).filter(Boolean);\n      const options = ['All', ...new Set(source)].sort((a, b) => a === 'All' ? -1 : b === 'All' ? 1 : a.localeCompare(b));\n      return { label, value: cf[key] || 'All', options, onChange: (e) => this.setCrossFilter(key, e.target.value) };\n    });\n\n    const total = rows.length;\n    const bsRecPct = avg(rows, r => norm(this.val(r, 'brand')) === 'bridgestone' ? 1 : 0);\n    const bsPosmPct = avg(rows, r => yes(this.val(r, 'bsPosm')) ? 1 : 0);\n    const bsStockPct = avg(rows, r => yes(this.val(r, 'bsStock')) ? 1 : 0);\n    const warrantyPct = avg(rows, r => yes(this.val(r, 'warranty')) ? 1 : 0);\n    const guaranteePct = avg(rows, r => yes(this.val(r, 'guarantee')) ? 1 : 0);\n    const promoPct = avg(rows, r => yes(this.val(r, 'promo')) ? 1 : 0);\n    const fsSignPct = avg(rows, r => yes(this.val(r, 'fsSign')) ? 1 : 0);\n    const bsSignPct = avg(rows, r => yes(this.val(r, 'bsSign')) ? 1 : 0);\n    const fsPosmPct = avg(rows, r => yes(this.val(r, 'fsPosm')) ? 1 : 0);\n\n    let kpis = [];\n    if (active === 'exec') {\n      kpis = [\n        { label: 'Stores / Records', value: String(total) },\n        { label: 'Regions', value: String(Object.keys(this.group(rows, 'region')).length) },\n        { label: 'Channels', value: String(Object.keys(this.group(rows, 'channel')).length) },\n        { label: 'Bridgestone Recommended', value: pct(bsRecPct) },\n        { label: 'Bridgestone POSM', value: pct(bsPosmPct) },\n        { label: 'Warranty Offered', value: pct(warrantyPct) },\n      ];\n    } else if (active === 'visibility') {\n      kpis = [\n        { label: 'Bridgestone Signage', value: pct(bsSignPct) },\n        { label: 'Firestone Signage', value: pct(fsSignPct) },\n        { label: 'Bridgestone POSM', value: pct(bsPosmPct) },\n        { label: 'Firestone POSM', value: pct(fsPosmPct) },\n      ];\n    } else if (active === 'warranty') {\n      kpis = [\n        { label: 'Warranty Offered', value: pct(warrantyPct) },\n        { label: 'Guarantee Offered', value: pct(guaranteePct) },\n        { label: 'Bridgestone Stock', value: pct(bsStockPct) },\n        { label: 'Promotion Mentioned', value: pct(promoPct) },\n      ];\n    }\n\n    const genderBars = this.topBars(this.group(rows, 'gender'), 6);\n    const ageBars = this.topBars(this.group(rows, 'ageGroup'), 8);\n    const vehicleBars = this.topBars(this.group(rows, 'vehicleType'), 8);\n    const competitorBars = this.topBars(this.group(rows, 'competitorDetail'), 8);\n\n    const brandGroups = this.group(rows, 'brand');\n    const brandBars = this.topBars(brandGroups, 8);\n    const regionGroups = this.group(rows, 'region');\n    const regionBars = this.topBars(regionGroups, 9);\n    const skuGroups = this.group(rows, 'sku');\n    const skuBars = this.topBars(skuGroups, 8);\n    const posmTypeGroups = this.group(rows, 'posmType');\n    const posmTypeBars = this.topBars(posmTypeGroups, 8);\n\n    const channelTable = Object.entries(this.group(rows, 'channel')).map(([name, arr]) => ({\n      name, count: arr.length, bsRec: pct(avg(arr, r => norm(this.val(r, 'brand')) === 'bridgestone' ? 1 : 0)),\n    })).sort((a, b) => b.count - a.count);\n    const regionTable = Object.entries(this.group(rows, 'region')).map(([name, arr]) => ({\n      name, count: arr.length, bsRec: pct(avg(arr, r => norm(this.val(r, 'brand')) === 'bridgestone' ? 1 : 0)),\n    })).sort((a, b) => b.count - a.count);\n    const storeListRows = rows.slice(0, 300).map(r => ({\n      store: esc(this.val(r, 'store')), channel: esc(this.val(r, 'channel')), region: esc(this.val(r, 'region')),\n      shopper: esc(this.val(r, 'shopper')), brand: esc(this.val(r, 'brand')),\n    }));\n\n    const posmRegionTable = Object.entries(this.group(rows, 'region')).map(([name, arr]) => ({\n      name, bsPosm: pct(avg(arr, r => yes(this.val(r, 'bsPosm')) ? 1 : 0)), fsPosm: pct(avg(arr, r => yes(this.val(r, 'fsPosm')) ? 1 : 0)),\n    })).sort((a, b) => a.name.localeCompare(b.name));\n    const posmDetailRows = rows.slice(0, 300).map(r => ({\n      store: esc(this.val(r, 'store')), channel: esc(this.val(r, 'channel')), bsSign: esc(this.val(r, 'bsSign')),\n      fsSign: esc(this.val(r, 'fsSign')), bsPosm: esc(this.val(r, 'bsPosm')), fsPosm: esc(this.val(r, 'fsPosm')), posmType: esc(this.val(r, 'posmType')),\n    }));\n\n    const salesDetailRows = rows.slice(0, 300).map(r => ({\n      store: esc(this.val(r, 'store')), channel: esc(this.val(r, 'channel')), brand: esc(this.val(r, 'brand')), sku: esc(this.val(r, 'sku')),\n      priceQuality: esc(this.val(r, 'priceQuality')), price: esc(this.val(r, 'price')), promoDetail: esc(this.val(r, 'promoDetail')),\n    }));\n\n    const warrantyTypeTable = Object.entries(this.group(rows, 'warrantyDetail')).map(([name, arr]) => ({ name, count: arr.length })).sort((a, b) => b.count - a.count);\n    const guaranteeTypeTable = Object.entries(this.group(rows, 'guaranteeDetail')).map(([name, arr]) => ({ name, count: arr.length })).sort((a, b) => b.count - a.count);\n    const warrantyDetailRows = rows.slice(0, 300).map(r => ({\n      store: esc(this.val(r, 'store')), channel: esc(this.val(r, 'channel')), warranty: esc(this.val(r, 'warranty')),\n      warrantyDetail: esc(this.val(r, 'warrantyDetail')), guarantee: esc(this.val(r, 'guarantee')), guaranteeDetail: esc(this.val(r, 'guaranteeDetail')),\n    }));\n\n    const rawRows = rows.slice(0, 300).map(r => ({ cells: s.allColumns.map(c => esc(r[c])) }));\n\n    const activeLabelMap = Object.fromEntries(SECTION_DEFS.map(x => [x.key, x.label]));\n    const activeSubMap = {\n      exec: 'Coverage, brand visibility and communication overview',\n      stores: 'Coverage completed per channel, region and store',\n      demographic: 'Shopper gender, age and vehicle type used for quotation',\n      visibility: 'Bridgestone and Firestone signage / POSM presence',\n      sales: 'Brand and SKU recommendation, price/quality, promotion',\n      warranty: 'Warranty and guarantee communication at point of sale',\n      drill: '',\n    };\n\n    const monthVals = [...new Set(rows.map(r => this.monthName(this.val(r, 'month'))).filter(Boolean))];\n    const monthDates = monthVals.map(v => ({ v, d: new Date(v.replace(/^([A-Za-z]{3}) (\\d{4})$/, '$1 1, $2')) }))\n      .filter(x => !isNaN(x.d)).sort((a, b) => a.d - b.d);\n    let monthBadge = 'Imported Data';\n    if (monthDates.length === 1) monthBadge = monthDates[0].v;\n    else if (monthDates.length > 1) monthBadge = `${monthDates[0].v} – ${monthDates[monthDates.length - 1].v}`;\n\n    return {\n      sections,\n      storeFilterOptions,\n      crossFilters,\n      hasKpis: kpis.length > 0,\n      kpis,\n      isExec: active === 'exec', isStores: active === 'stores', isDemographic: active === 'demographic',\n      isVisibility: active === 'visibility', isSales: active === 'sales', isWarranty: active === 'warranty', isDrill: active === 'drill',\n      activeSectionLabel: activeLabelMap[active],\n      activeSectionSub: activeSubMap[active],\n      monthBadge,\n      execSummaryText1: `${total} records visible after filtering — ${pct(bsRecPct)} Bridgestone recommendation, ${pct(bsPosmPct)} Bridgestone POSM visibility, ${pct(warrantyPct)} warranty communication.`,\n      execSummaryText2: `Mar–May trend: strong staff friendliness & product knowledge, but inconsistent value-add messaging (warranty/guarantee) and a May dip in Bridgestone-first recommendation despite good POSM counter-flyer compliance (97%). POSM cube visibility (31%) and stock availability remain the biggest brand-conversion risks.`,\n      brandBars, regionBars, skuBars, posmTypeBars,\n      genderBars, ageBars, vehicleBars, competitorBars,\n      channelTable, regionTable, storeListRows,\n      posmRegionTable, posmDetailRows,\n      salesDetailRows,\n      warrantyTypeTable, guaranteeTypeTable, warrantyDetailRows,\n      allColumns: s.allColumns, rawRows, rawTotalCount: s.rawData.length,\n      thStyle: 'padding:10px 14px; text-align:left; font-size:10.5px; font-weight:700; color:#8592A6; text-transform:uppercase; letter-spacing:0.3px;',\n      thStyleRight: 'padding:10px 14px; text-align:right; font-size:10.5px; font-weight:700; color:#8592A6; text-transform:uppercase; letter-spacing:0.3px;',\n      tdStyle: 'padding:10px 14px; color:#3A4658;',\n      tdStyleRight: 'padding:10px 14px; text-align:right; color:#3A4658; font-weight:600;',\n      selectSection: (e) => this.selectSection(e),\n      exportExcel: () => this.exportExcel(),\n      importData: (e) => this.importData(e),\n      resetFilters: () => this.resetFilters(),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
